<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BR IPM</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c21;--bg4:#242429;--bg5:#2c2c34;
  --border:#2a2a32;--border2:#3a3a46;--border3:#4e4e60;
  --text:#eeeef5;--text2:#9898b0;--text3:#58586e;--text4:#3a3a4a;
  --red:#9b1a2f;--red2:#7d1526;--red3:#c2203a;--red-glow:rgba(155,26,47,.18);
  --blue:#4a9edd;--blue-bg:#0a1e35;--blue-text:#7dc4f8;
  --green:#2ea868;--green-bg:#0a2018;--green-text:#4dcf8a;
  --amber:#e8a020;--amber-bg:#201600;--amber-text:#f5c050;
  --orange:#d06818;--orange-bg:#1e1006;--orange-text:#f0a060;
  --purple:#8b5cf6;--purple-bg:#1e1040;--purple-text:#c4b5fd;
  --mono:'DM Mono','Courier New',monospace;
  --sans:'Inter',system-ui,sans-serif;
  --r:7px;--rl:12px;
  --s-indesign:#888899;--s-review:#4dcf8a;--s-approved:#eeeef5;
  --s-revision:#f5c050;--s-obsolete:#3a3a4a;--s-current:#eeeef5;--c-indesign:#f97316;--c-review:#eab308;--c-approved:#22c55e;--c-mfg:#3b82f6;--c-revision:#a855f7;--c-obsolete:#3a3a4a;--c-current:#eeeef5;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;overflow:hidden}
.app{display:grid;grid-template-columns:228px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:14px 14px 10px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-logo img{width:90%;max-width:170px;display:block;margin:0 auto}
.sidebar-car{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--red3);text-transform:uppercase;margin-top:8px;text-align:center}
.nav-section{padding:13px 14px 4px;font-size:10px;letter-spacing:.12em;color:var(--text4);text-transform:uppercase;font-weight:700}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;width:100%;text-align:left;transition:all .12s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--bg3);color:var(--text);border-left:2px solid var(--red3)}
.nav-btn svg{width:15px;height:15px;flex-shrink:0}
.sidebar-stats{margin-top:auto;padding:13px 14px;border-top:1px solid var(--border)}
.sstat{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sstat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sstat-v{font-size:14px;font-weight:700;font-family:var(--mono)}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text3)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text4);flex-shrink:0}
.dot.live{background:var(--green)}.dot.syncing{background:var(--amber)}.dot.error{background:var(--red3)}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:11px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:9px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;flex:1}
.main-content{flex:1;overflow-y:auto;padding:20px}
.btn{padding:7px 14px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;user-select:none}
.btn:hover{background:var(--bg4);border-color:var(--border3)}
.btn.primary{background:var(--red);border-color:var(--red2);color:#fff}.btn.primary:hover{background:var(--red2)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.danger{color:#f09595;border-color:#6b1515}.btn.danger:hover{background:#1e0808}
.btn.ghost{border-color:transparent;background:transparent}.btn.ghost:hover{background:var(--bg3)}
.btn.icon{padding:5px;border-color:transparent;background:transparent}.btn.icon:hover{background:var(--bg3);border-color:var(--border)}
.btn svg{width:14px;height:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--bg3);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border)}
.sc-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.sc-v{font-size:20px;font-weight:700;font-family:var(--mono)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text2)}
th.sorted .sort-arrow{color:var(--red3);opacity:1}
.sort-arrow{margin-left:3px;opacity:.4;font-size:10px}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
tr.focused td{background:var(--bg4)}
tr.focused td:first-child{border-left:2px solid var(--red3)}
.pn{font-family:var(--mono);font-size:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;letter-spacing:.04em}
.pn.oem{color:var(--blue-text);border-color:#183a5a;background:var(--blue-bg)}
.badge{font-size:11px;padding:2px 8px;border-radius:9px;font-weight:600;white-space:nowrap}
.b-inwork{color:var(--s-indesign);background:var(--bg4);border:1px solid var(--border2)}
.b-review{color:var(--s-review);background:var(--green-bg);border:1px solid #1a3a28}
.b-approved{color:var(--s-approved);background:var(--bg5);border:1px solid var(--border3)}
.b-revision{color:var(--s-revision);background:var(--amber-bg);border:1px solid #3a2a00}
.b-obsolete{color:var(--s-obsolete);background:var(--bg4);border:1px solid var(--border)}
.b-current{color:var(--s-current);background:var(--bg5);border:1px solid var(--border3)}
.rev-badge{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:3px}
.rev-pre{background:var(--amber-bg);color:var(--amber-text);border:1px solid #3a2a00}
.rev-rel{background:var(--green-bg);color:var(--green-text);border:1px solid #1a3a20}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1;padding:7px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px}
.search-row input:focus{outline:2px solid var(--red3);outline-offset:-1px}
/* SERIAL DOT */
.serial-dot-btn{color:var(--purple);font-size:11px;cursor:pointer;margin-left:4px;vertical-align:middle;user-select:none;flex-shrink:0}
.serial-dot-btn:hover{color:var(--purple-text)}
.serial-dot-warn{color:var(--purple);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* SERIAL BADGES IN TREE */
.sn-badge{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sn-on-car{color:var(--green-text);border-color:var(--green-bg);background:var(--green-bg)}
.sn-on-car:hover{border-color:var(--green)}
.sn-needs{color:var(--purple-text);border-color:var(--purple-bg);background:var(--purple-bg)}
.sn-none{color:var(--text3);border-color:var(--border);background:var(--bg4)}
/* TREE */
.tree-row{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:6px;cursor:pointer;transition:background .08s;user-select:none}
.tree-row:hover{background:var(--bg3)}.tree-row.selected{background:var(--blue-bg)}
.tree-row.orphan{border-left:2px solid var(--orange);background:var(--orange-bg)}
.tree-row.obsolete-warn{border-left:2px solid var(--text4);background:var(--bg4)}
.tree-toggle{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;flex-shrink:0}
.tree-pn{font-family:var(--mono);font-size:11px;color:var(--text2);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis}
.tree-pn.oem{color:var(--blue-text)}
.tree-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tree-metrics{display:flex;gap:6px;margin-left:auto;flex-shrink:0;align-items:center;flex-wrap:nowrap}
.tree-m{font-size:11px;color:var(--text2);font-family:var(--mono);white-space:nowrap;cursor:pointer;padding:1px 4px;border-radius:3px;display:flex;align-items:center;gap:2px}
.tree-m:hover{background:var(--bg4);color:var(--text)}
.assignee-chip{font-size:10px;color:var(--text3);padding:1px 5px;background:var(--bg4);border-radius:3px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
/* DETAIL */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.df{padding:8px 10px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)}
.df-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.df-v{font-size:13px;font-weight:500}
.df-v.mono{font-family:var(--mono);font-size:12px}
.df-sub{font-size:10px;color:var(--text3);margin-top:2px}
.children-list{border-top:1px solid var(--border);padding-top:10px;margin-top:8px}
.cl-hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.cl-item{display:flex;align-items:center;gap:7px;padding:6px 8px;background:var(--bg3);border-radius:var(--r);margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.cl-item:hover{border-color:var(--border2);background:var(--bg4)}
.cl-pn{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:80px}
.cl-pn.oem{color:var(--blue-text)}
.cl-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-arrow{color:var(--text3);font-size:12px;flex-shrink:0}
/* CTX */
.ctx-menu{position:fixed;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:4px;min-width:180px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.6)}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:5px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s}
.ctx-item:hover{background:var(--bg4)}
.ctx-item.danger{color:#f09595}.ctx-item.danger:hover{background:#1e0808}
.ctx-item svg{width:14px;height:14px;flex-shrink:0}
.ctx-divider{height:1px;background:var(--border);margin:3px 0}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px}
.alert-info{background:var(--blue-bg);color:var(--blue-text);border:1px solid #183a5a}
.alert-warn{background:var(--amber-bg);color:var(--amber-text);border:1px solid #3a2a00}
.alert-err{background:#1e0808;color:#f09595;border:1px solid #6b1515}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border-radius:20px;font-size:12px;color:var(--text2);border:1px solid var(--border)}
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty svg{width:36px;height:36px;margin:0 auto 10px;display:block}
.b-indesign{color:#f97316;background:#1c0e04;border:1px solid #7c3912}.b-review{color:#eab308;background:#1c1600;border:1px solid #6b5200}.b-approved{color:#22c55e;background:#051a0d;border:1px solid #145228}.b-mfg{color:#3b82f6;background:#030d1c;border:1px solid #1a3a5a}.b-revision{color:#a855f7;background:#12052a;border:1px solid #5a1a7c}.b-obsolete{color:#9898b0;background:var(--bg4);border:1px solid var(--border)}.b-current{color:var(--text);background:var(--bg5);border:1px solid var(--border3)}.mfg-open{color:var(--text);background:var(--bg3);border:1px solid var(--border2)}.mfg-inprog{color:#eab308;background:#1c1600;border:1px solid #6b5200}.mfg-inspection{color:#22c55e;background:#051a0d;border:1px solid #145228}.mfg-done{color:#3b82f6;background:#030d1c;border:1px solid #1a3a5a}.mfg-hold{color:#f09595;background:#1e0808;border:1px solid #6b1515}.mfg-cancel{color:#9898b0;background:var(--bg4);border:1px solid var(--border)}.tree-obs{border-left:2px solid var(--c-obsolete)!important;background:var(--bg4);opacity:.6}.list-obs td{opacity:.45}.tab-btn{padding:8px 16px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;border-bottom:2px solid transparent;transition:all .12s}.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--text);border-bottom-color:var(--red3)}.filter-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:2px 8px;color:var(--text2)}@keyframes dl-pulse{0%,100%{background:#9e1b32;border-color:#9e1b32}50%{background:var(--bg3);border-color:var(--border2)}}.dm-seg{cursor:default;transition:opacity .12s}.dm-seg:hover{opacity:.8}.dm-sub-card:hover{border-color:var(--border2)!important;background:var(--bg4)!important}#_dd_host{background:transparent!important;border:none!important;max-width:100vw!important;max-height:100vh!important;width:100vw;height:100vh;overflow:visible!important;pointer-events:none;padding:0;margin:0;}#_dd_host::backdrop{background:transpar //  which stacks on top of any other open dialog in the top layer.
// ══════════════════════════════════════════════════

let _csDialogEl=null;
const _csState={current:null};

function _csGetHost(){
  if(!_csDialogEl){
    _csDialogEl=document.createElement("dialog");
    _csDialogEl.id="_dd_host";
    _csDialogEl.style.cssText="background:transparent;border:none;padding:0;margin:0;width:100vw;max-width:100vw;height:100vh;max-height:100vh;overflow:visible;pointer-events:none;outline:none;";
    document.body.appendChild(_csDialogEl);
  }
  return _csDialogEl;
}

function _csClose(){
  const host=_csGetHost();
  if(host.open)host.close();
  host.innerHTML="";
  if(_csState.current){
    const t=document.getElementById(_csState.current);
    if(t)t.style.outline="";
  }
  _csState.current=null;
}

function _csOpen(triggerId){
  if(_csState.current===triggerId){_csClose();return;}
  _csClose();

  const trigger=document.getElementById(triggerId);
  if(!trigger)return;
  const stored=_csOpts[triggerId];
  if(!stored)return;
  const {options,fnName}=stored;

  const rect=trigger.getBoundingClientRect();
  const maxH=Math.min(300,options.length*38+8);
  const spaceBelow=window.innerHeight-rect.bottom;
  const openUp=spaceBelow<maxH+8&&rect.top>maxH+8;
  // Minimum popup width: max of trigger width or 180px
  const popW=Math.max(rect.width,200);
  // Clamp left so the right edge stays within viewport
  const left=Math.min(rect.left,window.innerWidth-popW-8);
  const posStyle=openUp
    ?`bottom:${window.innerHeight-rect.top+2}px;`
    :`top:${rect.bottom+2}px;`;

  const host=_csGetHost();
  // After inserting, we'll measure and clamp — use min-width for natural sizing
  host.innerHTML=`<div id="cs-pop" style="
    position:fixed;left:${left}px;${posStyle}
    min-width:${popW}px;max-width:calc(100vw - ${left}px - 8px);max-height:${maxH}px;
    overflow-y:auto;overflow-x:hidden;background:var(--bg3);border:1px solid var(--border2);
    border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.85);
    padding:4px;pointer-events:auto;font-family:var(--sans);font-size:13px;color:var(--text);
    width:max-content;
  ">${options.map(o=>`<div class="dd-opt" data-val="${(o.value||"").replace(/"/g,"&quot;")}"
    style="padding:8px 10px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;
    ${o.color?"color:"+o.color:""}
    ${o.value===stored.currentVal?"background:var(--bg4);":""}"
    ><span style="width:12px;font-size:11px;color:var(--red3)">${o.value===stored.currentVal?"✓":""}</span>${o.label||"—"}</div>`).join("")}</div>`;

  host.querySelectorAll(".dd-opt").forEach(opt=>{
    opt.addEventListener("mousedown",e=>{
      e.preventDefault();e.stopPropagation();
      const val=opt.dataset.val;
      // Update trigger display
      const selOpt=options.find(o=>o.value===val)||{label:val,color:""};
      const labelEl=trigger.querySelector(".csel-label");
      if(labelEl){
        labelEl.textContent=selOpt.label||"—";
        labelEl.style.color=selOpt.color||"";
        if(!val)labelEl.style.color="var(--text3)";
      }
      trigger.style.color=selOpt.color||"var(--text)";
      trigger.dataset.cselVal=val;
      _csClose();
      if(fnName&&window[fnName])window[fnName](val,triggerId);
    });
    opt.addEventListener("mouseenter",()=>opt.style.background="var(--bg4)");
    opt.addEventListener("mouseleave",()=>opt.style.background=opt.dataset.val===stored.currentVal?"var(--bg4)":"");
  });

  _csState.current=triggerId;
  trigger.style.outline="2px solid var(--red3)";
  trigger.style.outlineOffset="-1px";

  host.addEventListener("click",e=>{if(e.target===host)_csClose();},{once:true});
  host.showModal();

  // Keyboard nav
  let focusIdx=options.findIndex(o=>o.value===(stored.currentVal||""));
  if(focusIdx<0)focusIdx=0;
  const opts=host.querySelectorAll(".dd-opt");
  const setFocus=i=>{
    focusIdx=Math.max(0,Math.min(i,opts.length-1));
    opts.forEach((el,j)=>el.style.outline=j===focusIdx?"1px solid var(--red3)":"");
    opts[focusIdx]?.scrollIntoView({block:"nearest"});
  };
  setFocus(focusIdx);
  const kh=e=>{
    if(!_csState.current)return;
    if(e.key==="ArrowDown"){e.preventDefault();e.stopPropagation();setFocus(focusIdx+1);}
    else if(e.key==="ArrowUp"){e.preventDefault();e.stopPropagation();setFocus(focusIdx-1);}
    else if(e.key==="Enter"||e.key===" "){e.preventDefault();e.stopPropagation();opts[focusIdx]?.dispatchEvent(new MouseEvent("mousedown",{bubbles:true}));}
    else if(e.key==="Escape"||e.key==="Tab"){e.preventDefault();e.stopPropagation();_csClose();}
  };
  document.addEventListener("keydown",kh,{capture:true});
  host._kh=kh;
  host.addEventListener("close",()=>{document.removeEventListener("keydown",kh,{capture:true});},{once:true});
}

// Parse YYYY-MM-DD as local date (avoids UTC midnight rollback bug)
function parseLocalDate(str){
  if(!str)return null;
  const[y,m,d]=(str||"").split("-").map(Number);
  if(!y||!m||!d)return null;
  return new Date(y,m-1,d);
}

// cSel: build trigger HTML and register options
function cSel(id,options,value,fnName,opts={}){
  _csOpts[id]={options,fnName,currentVal:value};
  const selOpt=options.find(o=>o.value===value)||{label:"",color:""};
  const {placeholder="— Select —",style="",cls="",small=false,mono=false}=opts;
  const label=value?selOpt.label||value:placeholder;
  const color=value&&selOpt.color?selOpt.color:"";
  const sz=small?"padding:3px 8px;font-size:12px":"padding:9px 12px;font-size:13px";
  const ff=mono?"font-family:var(--mono)":"font-family:var(--sans)";
  const safeVal=(value||"").replace(/"/g,"&quot;");
  return `<div class="csel-trigger ${cls}" id="${id}" data-csel-val="${safeVal}"
    style="display:inline-flex;align-items:center;width:100%;${sz};border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:${color||"var(--text)"};${ff};cursor:pointer;user-select:none;min-width:0;${style}"
    tabindex="0" role="combobox">
    <span class="csel-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${!value?"color:var(--text3)":""};">${label}</span>
  </div>`;
}

function cSelHTML(id,options,value,fnName,opts={}){return cSel(id,options,value,fnName,opts);}
function cSelVal(id){return document.getElementById(id)?.dataset?.cselVal??"";}

// Bind csel triggers — wire mousedown to open dropdown
function bindCSel(){
  document.querySelectorAll(".csel-trigger").forEach(el=>{
    if(el._cselBound)return;
    el._cselBound=true;
    el.addEventListener("mousedown",e=>{
      e.preventDefault();e.stopPropagation();
      _csOpen(el.id);
    });
    el.addEventListener("focus",()=>{if(_csState.current!==el.id)el.style.outline="2px solid var(--border2)";el.style.outlineOffset="-1px";});
    el.addEventListener("blur",()=>{if(_csState.current!==el.id)el.style.outline="";});
  });
  // Outside-click: close if clicking anything that isn't trigger or popup
  if(!document._cselOutside){
    document._cselOutside=true;
    document.addEventListener("mousedown",e=>{
      if(_csState.current&&!e.target.closest("#cs-pop")&&!e.target.closest(".csel-trigger")){
        _csClose();
      }
    },{capture:true});
  }
}

const parsePN=pn=>{const c=(pn||"").replace(/[A-Z]$/,"");if(c.length!==8||!/^\d+$/.test(c))return null;return{yy:c.slice(0,2),mm:c.slice(2,4),ss:c.slice(4,6),pp:c.slice(6,8)};};
const fullPN=(pn,rev)=>(rev&&rev!=="-")?pn+rev:pn+"-";
function suggestPN(parts,nha,excId){
  const np=parsePN(nha);if(!np)return"";
  const pool=parts.filter(x=>x.id!==excId&&!x.isOem);let used;
  if(np.mm==="00"){used=pool.map(x=>parsePN(x.pn)).filter(x=>x&&x.ss==="00"&&x.pp==="00"&&x.mm!=="00").map(x=>+x.mm);let n=1;while(used.includes(n))n++;return`${CAR}${String(n).padStart(2,"0")}0000`;}
  if(np.ss==="00"){used=pool.map(x=>parsePN(x.pn)).filter(x=>x&&x.mm===np.mm&&x.ss!=="00"&&x.pp==="00").map(x=>+x.ss);let n=1;while(used.includes(n))n++;return`${CAR}${np.mm}${String(n).padStart(2,"0")}00`;}
  used=pool.map(x=>parsePN(x.pn)).filter(x=>x&&x.mm===np.mm&&x.ss===np.ss&&x.pp!=="00").map(x=>+x.pp);let n=1;while(used.includes(n))n++;return`${CAR}${np.mm}${np.ss}${String(n).padStart(2,"0")}`;
}
const pnLevel=nha=>{const np=parsePN(nha);if(!np)return"";if(np.mm==="00")return"MM";if(np.ss==="00")return"SS";return"PP";};
function nextSerial(parts,pn,rev,extraSns){
  const base=fullPN(pn,rev);
  const existing=[...(parts.find(x=>x.pn===pn)?.serials||[]).map(s=>s.sn),...(extraSns||[])];
  let n=1;while(existing.includes(base+"K"+String(n).padStart(2,"0")))n++;return base+"K"+String(n).padStart(2,"0");
}

// Serial helpers — "deployed" = in-assembly.
// If parent part is NOT serialized, any in-assembly serial is considered deployed (on-car equivalent).
// If parent IS serialized, it's only deployed when we can trace up to a root in-assembly.
function snDeployed(sn,allParts){
  if(sn.locationKind!=="in-assembly")return false;
  if(!sn.parentSn)return true;// no parent S# specified — treat as deployed
  // find the parent serial
  for(const p of (allParts||[])){
    const ps=(p.serials||[]).find(s=>s.sn===sn.parentSn);
    if(ps)return snDeployed(ps,allParts);// recurse up chain
  }
  return true;// parent S# not found — assume deployed
}
function getDeployedSerialsForParentSn(part,parentSn,allParts){
  return(part.serials||[]).filter(s=>{
    if(s.locationKind!=="in-assembly")return false;
    if(!parentSn)return!s.parentSn;// top-level: no parent S# assigned
    if(s.parentSn===parentSn)return true;
    // walk up chain
    let cur=s;const vis=new Set();
    while(cur&&cur.parentSn&&!vis.has(cur.sn)){
      vis.add(cur.sn);
      if(cur.parentSn===parentSn)return true;
      let found=false;
      for(const pp of allParts){const ns=(pp.serials||[]).find(x=>x.sn===cur.parentSn);if(ns){cur=ns;found=true;break;}}
      if(!found)break;
    }
    return false;
  });
}
function getUnassignedSerials(part){return(part.serials||[]).filter(s=>s.locationKind==="storage"||s.locationKind==="disposed"||!s.locationKind);}
function qtyDeployed(part,allParts){return(part.serials||[]).filter(s=>snDeployed(s,allParts)).length;}
function qtyOnHand(part,allParts){
  const inStorage=(part.serials||[]).filter(s=>s.locationKind==="storage").length;
  const deployed=part.serialized?qtyDeployed(part,allParts||[]):0;
  return{onHand:inStorage+deployed,inStorage,deployed};
}

const qtyInParent=(p,parentPn)=>{const wu=(p.whereUsed||[]).find(w=>w.parentPn===parentPn);return wu?wu.qty:1;};
function calcTotalQty(pn,parts){
  const p=parts.find(x=>x.pn===pn);if(!p||(p.whereUsed||[]).length===0)return 0;
  function walk(pn2,vis){
    if(vis.has(pn2))return 0;vis.add(pn2);
    const pp=parts.find(x=>x.pn===pn2);if(!pp)return 0;
    const wu=pp.whereUsed||[];if(!wu.length)return 1;
    return wu.reduce((s,w)=>s+w.qty*walk(w.parentPn,new Set(vis)),0);
  }
  return walk(pn,new Set());
}
function rollup(id,parts,vis=new Set()){
  if(vis.has(id))return{cost:0,mass:0};vis.add(id);
  const p=parts.find(x=>x.id===id);if(!p)return{cost:0,mass:0};
  const kids=parts.filter(x=>(x.whereUsed||[]).some(w=>w.parentPn===p.pn));
  if(!kids.length)return{cost:p.isOem?(p.unitCost||p.pkgCost||0):(p.matCost||0),mass:p.isOem?(parseFloat(p.unitMass)||0):(parseFloat(p.mass)||0)};
  let cost=0,mass=0;
  kids.forEach(c=>{const q=qtyInParent(c,p.pn);const r=rollup(c.id,parts,new Set(vis));cost+=r.cost*q;mass+=r.mass*q;});
  return{cost,mass};
}
function buildTreeNodes(parts,parentPn){
  const active=parts.filter(p=>(p.whereUsed||[]).some(w=>w.parentPn===parentPn));
  const brActive=active.filter(p=>!p.isOem&&!isConsumable(p.pn)&&p.status!=="Obsolete").sort((a,b)=>a.pn.localeCompare(b.pn));
  const brObs=active.filter(p=>!p.isOem&&p.status==="Obsolete").sort((a,b)=>a.pn.localeCompare(b.pn));
  const oemActive=active.filter(p=>p.isOem&&p.status!=="Obsolete (OEM)").sort((a,b)=>a.pn.localeCompare(b.pn));
  const brCons=active.filter(p=>!p.isOem&&isConsumable(p.pn)&&p.status!=="Obsolete").sort((a,b)=>a.pn.localeCompare(b.pn));
  return[...brActive,...brObs,...oemActive,...brCons].map(p=>({...p,_qty:qtyInParent(p,parentPn),children:buildTreeNodes(parts,p.pn)}));
}
const getRoots=parts=>parts.filter(p=>!p.whereUsed||p.whereUsed.length===0);
// Get today's date in Central Time (UTC-5/UTC-6)
function getCentralToday(){
  const now=new Date();
  // offset in ms: Central is UTC-6 standard, UTC-5 daylight
  // Use toLocaleString to get Central date
  const ct=new Date(now.toLocaleString("en-US",{timeZone:"America/Chicago"}));
  ct.setHours(0,0,0,0);return ct;
}
const isOverdue=(p)=>{
  if(!p.designDueDate)return false;
  if(p.status!=="In Design"&&p.status!=="Needs Review")return false;
  const today=getCentralToday();
  const due=parseLocalDate(p.designDueDate);
  return due<today;
};
const dueDateStyle2=(d)=>{
  if(!d)return{style:"",icon:""};
  const today=getCentralToday();
  const due=new Date(d);due.setHours(0,0,0,0);
  const diff=(due-today)/(864e5);
  if(diff<0)return{style:"color:var(--red3);font-weight:600",icon:`<span style="color:var(--red3);margin-left:3px" title="Overdue">⚠</span>`};
  if(diff<=1)return{style:"color:var(--amber-text);font-weight:600",icon:`<span style="color:var(--amber-text);margin-left:3px" title="Due soon">⚠</span>`};
  return{style:"color:var(--text2)",icon:""};
};
const isOrphan=(p,parts)=>(p.whereUsed||[]).some(w=>w.parentPn&&!parts.find(x=>x.pn===w.parentPn));
// Project code helpers
function getProjCode(pn){return pn?pn.slice(0,2):""}
function isLowCode(code){const n=parseInt(code,10);return!isNaN(n)&&n<=20;}
function isAssemblyOrder(o){
  const p=S.parts.find(x=>x.id===o.partId);
  if(!p)return false;
  return S.parts.some(x=>(x.whereUsed||[]).some(w=>w.parentPn===p.pn));

function isMasterPN(pn){return typeof pn==="string"&&pn.length===8&&pn.slice(2)==="000000";}
const isConsumable=pn=>{const d=(pn||"").replace(/[^0-9]/g,"");return d.length>=6&&d[4]==="9"&&d[5]==="9";};
function isLowCodePart(p){return isLowCode(getProjCode(p.pn));}
function fmtProjCode(code,name){return name?`${code} - ${name}`:code;}

const isUnplaced=p=>!p.isOem&&(!p.whereUsed||p.whereUsed.length===0)&&!isLowCode(getProjCode(p.pn))&&!isMasterPN(p.pn);
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const hasKids=(pn,parts)=>parts.some(x=>(x.whereUsed||[]).some(w=>w.parentPn===pn));

function openCreditsDialog(kind, id){
  const obj=kind==="mfg"?S.mfgOrders.find(x=>x.id===id):S.parts.find(x=>x.id===id);
  if(!obj)return;
  const credits=(obj.credits||[]).slice().reverse();
  const title=kind==="mfg"?`${obj.mfgNum||""} ${esc(obj.partName||"")}`:`${fullPN(obj.pn,obj.rev)} — ${esc(obj.name||"")}`;
  const thS="padding:7px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;border-bottom:1px solid var(--border)";
  const tdS="padding:8px 10px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap";
  const tableRows=credits.length?credits.map(cr=>{
    const statusChanged=cr.from!==cr.to;
    const assigneeChanged=(cr.oldAssignee||cr.assignee||"")!==(cr.newAssignee||cr.assignee||"");
    const oldA=cr.oldAssignee||cr.assignee||"—";
    const newA=cr.newAssignee||cr.assignee||"—";
    return`<tr>
      <td style="${tdS};font-family:var(--mono);color:var(--text3)">${cr.ts||cr.date||"—"}</td>
      <td style="${tdS}">${statusChanged?`<span style="color:${sColor(cr.from)};font-weight:600">${cr.from}</span> <span style="color:var(--text3)">→</span> <span style="color:${sColor(cr.to)};font-weight:600">${cr.to}</span>`:`<span style="color:var(--text3)">—</span>`}</td>
      <td style="${tdS};color:var(--text2)">${assigneeChanged?`<span style="color:var(--text3)">${esc(oldA)}</span> → <span style="font-weight:600;color:var(--text)">${esc(newA)}</span>`:esc(oldA)}</td>
      <td style="${tdS};font-weight:600;color:${(cr.changedBy||"")===myName()?"#22d3ee":"var(--text)"}">${esc(cr.changedBy||"—")}</td>
    </tr>`;
  }).join(""):`<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No credits logged yet.</td></tr>`;
  const table=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:540px">
    <thead><tr>
      <th style="${thS}">Time</th>
      <th style="${thS}">Status Change</th>
      <th style="${thS}">Assignee</th>
      <th style="${thS}">Changed By</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table></div>`;
  const d=openDlg("credits","min(600px,96vw)",`
  <div class="dh"><div class="dh-title">Credits — ${title}</div><button id="cr-x" class="btn icon" style="margin-left:auto">${I.x}</button></div>
  <div class="db" style="padding:0">${table}</div>
  <div class="df"><button id="cr-close" class="btn primary">Close</button></div>`);
  d.querySelector("#cr-x").addEventListener("click",()=>closeDlg("credits"));
  d.querySelector("#cr-close").addEventListener("click",()=>closeDlg("credits"));
}

function showToast(msg, type){
  type=type||"warn";
  let t=document.getElementById("_toast");
  if(!t){t=document.createElement("div");t.id="_toast";document.body.appendChild(t);}
  t.textContent=msg;
  t.className="_toast-"+type;
  t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(0);z-index:99999;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;pointer-events:none;transition:opacity .3s;opacity:1;"
    +(type==="warn"?"background:#1c0e04;border:1px solid #7c3912;color:#f97316;"
      :type==="err"?"background:#1e0808;border:1px solid #6b1515;color:#f09595;"
      :"background:#051a0d;border:1px solid #145228;color:#22c55e;");
  clearTimeout(t._hide);
  t._hide=setTimeout(()=>{t.style.opacity="0";setTimeout(()=>{if(t.parentNode)t.parentNode.removeChild(t);},300);},2800);
}
function memberBlocked(action){
  showToast("🔒 "+(action||"Action")+" is restricted to leads and admins.","warn");
}

function logCredit(obj, fromStatus, toStatus, oldAssignee, newAssignee){
  if(!obj.credits)obj.credits=[];
  const now=new Date();
  const pad=n=>String(n).padStart(2,"0");
  const ts=now.getFullYear()+"-"+pad(now.getMonth()+1)+"-"+pad(now.getDate())+" "+pad(now.getHours())+":"+pad(now.getMinutes());
  obj.credits.push({from:fromStatus,to:toStatus,oldAssignee:oldAssignee||"(unassigned)",newAssignee:newAssignee||"(unassigned)",changedBy:myName()||"(unknown)",ts});
}
const nextRev=cur=>{const i=REV_OPTS.indexOf(cur||"-");return(i>=0&&i<REV_OPTS.length-1)?REV_OPTS[i+1]:cur;};
function sColor(s){
  if(s==="In Design")return"var(--c-indesign)";
  if(s==="Needs Review")return"var(--c-review)";
  if(s==="Design Approved")return"var(--c-approved)";
  if(s==="Manufactured")return"var(--c-mfg)";
  if(s==="Needs Revision")return"var(--c-revision)";
  if(s==="Obsolete"||s==="Obsolete (OEM)")return"var(--c-obsolete)";
  if(s==="Current")return"var(--text)";
  return"var(--text)";
}
function sBadgeCls(s){
  if(s==="In Design")return"b-indesign";
  if(s==="Needs Review")return"b-review";
  if(s==="Design Approved")return"b-approved";
  if(s==="Manufactured")return"b-mfg";
  if(s==="Needs Revision")return"b-revision";
  if(s==="Obsolete"||s==="Obsolete (OEM)")return"b-obsolete";
  if(s==="Current")return"b-current";
  return"b-indesign";
}
const sBadge=s=>`<span class="badge ${sBadgeCls(s)}">${s}</span>`;
function mfgBadgeCls(s){return{Open:"mfg-open","In Progress":"mfg-inprog","Needs Review":"mfg-review",Complete:"mfg-done","On Hold":"mfg-hold",Cancelled:"mfg-cancel"}[s]||"mfg-open";}
const mfgBadge=s=>`<span class="badge ${mfgBadgeCls(s)}">${s}</span>`;
const revBadge=rev=>`<span class="rev-badge ${(!rev||rev==="-")?"rev-pre":"rev-rel"}">${(!rev||rev==="-")?"–":rev}</span>`;
const fmtC=v=>v>0?"$"+v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
const fmtM=v=>v>0?v.toFixed(3)+" lb":"—";
function fmtQC(total,per,qty){return qty<=1?fmtC(per):`${fmtC(total)} (${fmtC(per)} ea)`;}
function fmtQM(total,per,qty){return qty<=1?fmtM(per):`${fmtM(total)} (${fmtM(per)} ea)`;}

  const nums=orders.map(o=>{const m=(o.mfgNum||"").match(/M(\d+)/);return m?parseInt(m[1]):0;});

}

function buildTreeView(){
  // Top-level roots excluding low-code parts
  const allRoots=getRoots(S.parts).filter(p=>!isUnplaced(p)&&!p.isOem&&!isLowCode(getProjCode(p.pn)));
  // rootParts computed below with code selector
  const unplacedParts=[...new Map([...S.parts.filter(isUnplaced),...S.parts.filter(p=>isOrphan(p,S.parts))].map(p=>[p.id,p])).values()].filter(p=>!p.isOem&&!isMasterPN(p.pn)&&p.status!=="Obsolete");
  const sel=S.selected;

  function node(n,depth){
    const r=rollup(n.id,S.parts),hasK=n.children&&n.children.length>0;
    const isExp=depth===0?true:S.expanded[n.id]===true,obs=n.status==="Obsolete"||n.status==="Obsolete (OEM)";
    const orp=isOrphan(n,S.parts),sc=isConsumable(n.pn)&&!n.isOem?"#eab308":sColor(n.status),qty=n._qty||1;
    const showAssignee=NEEDS_ASSIGNEE.includes(n.status)&&n.assignee;
    const ind=depth*18;
    const tqty=(n.whereUsed||[]).reduce((s,w)=>s+w.qty,0)||1;
    const snCount=(n.serials||[]).length,needsMore=n.serialized&&snCount<tqty;

    // Serials: just show purple dot on serialized parts (no deployment badges)
    const serialHtml="";

    let rowCls="tree-row";
    if(sel?.id===n.id)rowCls+=" selected";
    if(orp)rowCls+=" orphan";
    else if(obs)rowCls+=" tree-obs";
    else if(n.serialized&&needsMore)rowCls+=" serial-needs-sn";

    return`<div class="tree-node" data-id="${n.id}">
      <div class="${rowCls}" data-id="${n.id}" style="display:grid;grid-template-columns:minmax(240px,1fr) 44px 130px 110px;align-items:center;padding:3px 4px;border-radius:6px;gap:0">
        <div style="display:flex;align-items:center;gap:5px;min-width:0;padding-left:${ind}px">
          <span class="${depth===0?"":"tree-toggle"}" style="flex-shrink:0;${depth===0?"cursor:default;":""}">${depth===0?(hasK?"":""):(hasK?(isExp?"▾":"▸"):" ")}</span>
          <span style="font-family:var(--mono);font-size:11px;color:${n.isOem?"var(--blue-text)":isConsumable(n.pn)?"#eab308":"var(--text)"};flex-shrink:0;white-space:nowrap">${fullPN(n.pn,n.rev)}</span>
          <span style="color:${orp?"var(--red3)":n.isOem?"var(--text)":sColor(n.status)};font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(n.name)}">${esc(n.name)}</span>
          ${n.serialized?`<span class="serial-dot-btn" data-id="${n.id}" style="color:var(--purple);font-size:10px;cursor:pointer;flex-shrink:0">●</span>`:""}
          ${showAssignee?`<span class="assignee-chip" style="flex-shrink:0;${n.assignee===myName()?"background:#0e7490;border-color:#0e7490;color:#fff;font-weight:700":""}">${esc(n.assignee)}</span>`:""}
        </div>
        <div style="text-align:center;font-family:var(--mono);font-size:12px;color:${qty>1?"var(--amber-text)":"var(--text3)"}">${qty>1?`×${qty}`:""}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text);padding-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${hasK?`<span class="tree-chart-btn" data-id="${n.id}" data-metric="cost" style="cursor:pointer">${fmtQC(r.cost*qty,r.cost,qty)} ${I.pie}</span>`:fmtC(r.cost)}
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text);padding-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${hasK?`<span class="tree-chart-btn" data-id="${n.id}" data-metric="mass" style="cursor:pointer">${fmtQM(r.mass*qty,r.mass,qty)} ${I.pie}</span>`:fmtM(r.mass)}
        </div>
      </div>
      ${isExp&&hasK?`<div>${n.children.map(c=>node(c,depth+1)).join("")}</div>`:""}
    </div>`;
  }

  const colHdr=`<div style="display:grid;grid-template-columns:minmax(240px,1fr) 44px 130px 110px;padding:4px 4px;border-bottom:1px solid var(--border);margin-bottom:4px">
    <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding-left:18px">Part Number &amp; Name</span>
    <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;text-align:center">Qty</span>
    <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding-left:4px">Cost</span>
    <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding-left:4px">Mass</span>
  </div>`;

  // Build project code list for dropdown (codes > 20 that have roots)
  const rootCodes=[...new Set(allRoots.map(p=>getProjCode(p.pn)))].filter(c=>!isLowCode(c)).sort((a,b)=>parseInt(a)-parseInt(b));
  if(!S.activeTreeCode||!rootCodes.includes(S.activeTreeCode))S.activeTreeCode=rootCodes[0]||"";
  const codeRoots=allRoots.filter(p=>getProjCode(p.pn)===S.activeTreeCode);
  const activeRoot=S.isolatedTreeRoot?S.parts.find(p=>p.pn===S.isolatedTreeRoot)||(codeRoots.find(p=>p.pn===S.activeTreeRoot)||codeRoots[0]||null):(codeRoots.find(p=>p.pn===S.activeTreeRoot)||codeRoots[0]||null);
  if(activeRoot)S.activeTreeRoot=activeRoot.pn;
  const rootParts2=activeRoot?[activeRoot]:codeRoots;

  return`<div style="display:grid;grid-template-columns:${sel?"minmax(0,1fr) minmax(0,320px)":"1fr"};gap:12px;align-items:start">
    <div class="card" style="min-height:300px;overflow-x:auto" id="tree-card">
      ${rootCodes.length>0?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        ${cSel("tree-code-sel",rootCodes.map(code=>{const pc=(S.projectCodes||[]).find(x=>x.code===code);return{value:code,label:pc?fmtProjCode(code,pc.name):"BR"+code};}),S.activeTreeCode,"_cbTreeCode",{style:"width:180px"})}
        ${codeRoots.length>1?cSel("tree-root-sel",codeRoots.map(p=>({value:p.pn,label:fullPN(p.pn,p.rev)+" — "+p.name})),S.activeTreeRoot||codeRoots[0]?.pn||"","_cbTreeRoot",{style:"max-width:300px;"}):""}
      </div>`:""}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:11px;color:var(--text3)">Dbl-click or right-click to edit · <span style="color:var(--purple)">●</span> serialized</div>
        <div style="display:flex;gap:6px">
          ${S.isolatedTreeRoot?`<button class="btn sm primary" id="tree-unisolate" style="font-size:11px;padding:3px 8px">✕ Unisolate</button>`:""}
          <button class="btn sm" id="tree-expand-all" style="font-size:11px;padding:3px 8px">Expand All</button>
          <button class="btn sm" id="tree-collapse-all" style="font-size:11px;padding:3px 8px">Collapse All</button>
        </div>
      </div>
      ${colHdr}
      ${rootParts2.length?rootParts2.map(rp=>node({...rp,_qty:1,children:buildTreeNodes(S.parts,rp.pn)},0)).join(""):`<div class="empty" style="padding:30px 0">No parts yet.</div>`}
      ${unplacedParts.length?`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">
        <div class="tree-row" id="toggle-unplaced" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 6px">
          <span style="color:var(--red3);font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px">${I.unplaced} Unplaced / Orphan (${unplacedParts.length})</span>
          <span style="margin-left:auto;color:var(--text3)">${S.expanded.__unplaced!==false?"▾":"▸"}</span>
        </div>
        ${S.expanded.__unplaced!==false?`<div>${unplacedParts.map(p=>{const r=rollup(p.id,S.parts);return`<div class="tree-node" data-id="${p.id}"><div class="tree-row orphan" style="display:grid;grid-template-columns:minmax(240px,1fr) 44px 130px 110px;align-items:center;padding:3px 4px;border-radius:5px">
          <div style="display:flex;align-items:center;gap:5px;padding-left:0"><span class="tree-toggle"> </span><span style="font-family:var(--mono);font-size:11px;color:var(--text2);white-space:nowrap">${fullPN(p.pn,p.rev)}</span><span style="color:var(--red3);font-size:13px">${esc(p.name)}</span></div>
          <div></div><div style="font-family:var(--mono);font-size:11px;color:var(--text2);padding-left:4px">${fmtC(r.cost)}</div><div style="font-family:var(--mono);font-size:11px;color:var(--text2);padding-left:4px">${fmtM(r.mass)}</div>
        </div></div>`;}).join("")}</div>`:""}
      </div>`:""}
    </div>
    ${sel?buildDetailPanel(sel):""}
  </div>`;
}

function buildDetailPanel(sel){
  const sr=rollup(sel.id,S.parts);
  const comps=S.parts.filter(p=>(p.whereUsed||[]).some(w=>w.parentPn===sel.pn)).sort((a,b)=>a.pn.localeCompare(b.pn));
  const nhaParts=(sel.whereUsed||[]).map(w=>{const pp=S.parts.find(x=>x.pn===w.parentPn);return pp?`${fullPN(pp.pn,pp.rev)} ×${w.qty}`:w.parentPn;});
  const tqty=(sel.whereUsed||[]).reduce((s,w)=>s+w.qty,0)||1;
  const snCount=(sel.serials||[]).length,needsMore=sel.serialized&&snCount<tqty,hK=hasKids(sel.pn,S.parts);
  const {onHand,inStorage}=qtyOnHand(sel,S.parts);
  return`<div class="card" id="detail-panel" style="position:sticky;top:0;max-height:calc(100vh - 100px);overflow-y:auto">
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px">
      <div style="flex:1;min-width:0">
        <span class="pn ${sel.isOem?"oem":""}">${fullPN(sel.pn,sel.rev)}</span>
        <div style="font-size:15px;font-weight:700;margin-top:6px;color:${sColor(sel.status)}">${esc(sel.name)}</div>
        ${sel.isOem?`<div style="font-size:11px;color:var(--blue-text);margin-top:2px">${sel.manufacturer||""}</div>`:""}
      </div>
      ${!isMemberOnly()?`<button class="btn sm" id="detail-edit">${I.edit} Edit</button>`:""}
      <button class="btn sm" id="detail-credits" title="View Credits">${I.credits}</button>
      <button class="btn sm danger" id="detail-del">${I.trash}</button>
    </div>
    <div class="detail-grid">
      <div class="df"><div class="df-l">Status</div><div class="df-v">${sBadge(sel.status)}</div></div>
      <div class="df"><div class="df-l">Used In</div><div class="df-v mono" style="font-size:11px">${nhaParts.length?nhaParts.join(", "):"— top level"}</div></div>
      <div class="df"><div class="df-l">Cost (rolled up)</div><div class="df-v" id="detail-cost-chart" style="cursor:${hK?"pointer":"default"}">${fmtC(sr.cost)} ${hK?I.pie:""}</div></div>
      <div class="df"><div class="df-l">Mass (rolled up)</div><div class="df-v" id="detail-mass-chart" style="cursor:${hK?"pointer":"default"}">${fmtM(sr.mass)} ${hK?I.pie:""}</div></div>
      ${!sel.isOem
        ?`<div class="df"><div class="df-l">Material</div><div class="df-v">${sel.material||"—"}</div></div>
          <div class="df"><div class="df-l">Location</div><div class="df-v">${sel.location||"—"}</div></div>`
        :`<div class="df"><div class="df-l">Manufacturer</div><div class="df-v">${sel.manufacturer||"—"}</div></div>
          <div class="df"><div class="df-l">Unit</div><div class="df-v">${sel.unit||"each"}</div></div>
          <div class="df"><div class="df-l">Unit Cost</div><div class="df-v">${fmtC(sel.unitCost||sel.pkgCost||0)} / ${sel.unit||"ea"}</div></div>
          <div class="df"><div class="df-l">Unit Mass</div><div class="df-v">${fmtM(parseFloat(sel.unitMass)||0)} / ${sel.unit||"ea"}</div></div>
          <div class="df"><div class="df-l">Stock</div><div class="df-v">${sel.stockQty||sel.pkgQty||1} ${sel.stockUnit||sel.unit||""} @ ${fmtC(sel.stockCost||sel.pkgCost||0)}</div></div>`}
      ${sel.assignee?`<div class="df" style="grid-column:1/-1"><div class="df-l">Assignee</div><div class="df-v ${sel.assignee===myName()?"my-name":""}">${esc(sel.assignee)}</div></div>`:""}
      ${sel.drawingUrl?`<div class="df" style="grid-column:1/-1"><div class="df-l">Drawing</div><div class="df-v"><a href="${sel.drawingUrl}" target="_blank" style="color:var(--blue-text);font-size:12px">${I.link} ${sel.drawingUrl}</a></div></div>`:""}
    </div>
    ${sel.desc?`<div style="font-size:12px;color:var(--text2);padding:8px 0;border-top:1px solid var(--border)">${sel.desc}</div>`:""}
    ${(()=>{
      const deps=(sel.dependencies||[]).map(pn=>S.parts.find(x=>x.pn===pn)).filter(Boolean);
      const dependents=S.parts.filter(p=>(p.dependencies||[]).includes(sel.pn));
      if(!deps.length&&!dependents.length&&!sel.isOem)return`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        <div class="children-list">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
            <span class="cl-hdr" style="margin:0">Dependencies (0)</span>
            <button class="btn sm" id="detail-add-dep">${I.plus} Add Dependency</button>
          </div>
        </div>
      </div>`;
      const depItem=p=>`<div class="cl-item" data-id="${p.id}">
        <span class="cl-pn ${p.isOem?"oem":""}">${fullPN(p.pn,p.rev)}</span>
        <span class="cl-name" style="color:${sColor(p.status)}">${esc(p.name)}</span>
        <span class="cl-arrow">${I.arrow}</span>
      </div>`;
      return`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        ${!sel.isOem?`<div class="children-list" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
            <span class="cl-hdr" style="margin:0">Dependencies (${deps.length})</span>
            <button class="btn sm" id="detail-add-dep">${I.plus} Add Dependency</button>
          </div>
          ${deps.map(depItem).join("")}
        </div>`:""}
        ${dependents.length?`<div class="children-list">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
            <span class="cl-hdr" style="margin:0">Dependents (${dependents.length})</span>
          </div>
          ${dependents.map(depItem).join("")}
        </div>`:""}
      </div>`;
    })()}
    ${comps.length||!comps.length?`<div class="children-list">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span class="cl-hdr" style="margin:0">Components (${comps.length})</span>
        <button class="btn sm" id="detail-add-comp">${I.plus} Add Component</button>
      </div>
      ${comps.map(c=>{const q=qtyInParent(c,sel.pn);return`<div class="cl-item" data-id="${c.id}" oncontextmenu="ctxDetailComp(event,'${c.id}','${sel.pn}')">
        <span class="cl-pn ${c.isOem?"oem":""}">${fullPN(c.pn,c.rev)}</span>
        ${q>1?`<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">×${q}</span>`:""}
        <span class="cl-name" style="color:${sColor(c.status)}">${esc(c.name)}</span>
        <span class="cl-arrow">${I.arrow}</span>
      </div>`;}).join("")}
    </div>`:""}
    ${sel.serialized?`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:8px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;${needsMore?"color:var(--purple);font-weight:600":"color:var(--text2)"}">${snCount} serial${snCount!==1?"s":""}${needsMore?` — need ${tqty-snCount} more`:""}</span>
      <button class="btn sm" id="detail-serials" data-id="${sel.id}">${I.serial} Manage Serials</button>
    </div>`:""}
  </div>`;
}
// ══════════════════════════════════════════════════
//  LIST VIEW
// ══════════════════════════════════════════════════
function buildListView(){
  const f=S.listFilter,s=S.search.toLowerCase();
  const allBR=S.parts.filter(p=>!p.isOem);
  let filtered=allBR.filter(p=>{
    if(s&&!(p.pn+p.name+(p.material||"")+(p.assignee||"")+(p.location||"")).toLowerCase().includes(s))return false;
    if(f.status&&p.status!==f.status)return false;
    if(f.assignee&&p.assignee!==f.assignee)return false;
    if(f.location&&p.location!==f.location)return false;
    return true;
  });
  // Project code pre-filter
  const sort=arr=>[...arr].sort((a,b)=>{let av=a[S.listSort]||"",bv=b[S.listSort]||"";if(["matCost","mass"].includes(S.listSort)){av=+av||0;bv=+bv||0;return(av-bv)*S.listSortDir;}return(av<bv?-1:av>bv?1:0)*S.listSortDir;});
  // Apply project code filter
  if(S.listProjectFilter)filtered=filtered.filter(p=>getProjCode(p.pn)===S.listProjectFilter);
  const unplacedParts=filtered.filter(p=>(isUnplaced(p)||isOrphan(p,S.parts))&&p.status!=="Obsolete"&&!isMasterPN(p.pn));
  const placedParts=sort(filtered.filter(p=>!isUnplaced(p)&&!isOrphan(p,S.parts)&&p.status!=="Obsolete"));
  const obsoleteParts=sort(filtered.filter(p=>p.status==="Obsolete"));
  const hasFilter=Object.values(f).some(Boolean);
  const sortIcon=(col,s,d)=>s===col?(d===1?"↑":"↓"):"↕";
  const sortSpan=(col,s,d)=>`<span style="color:${s===col?"var(--red3)":"var(--text3)"};margin-left:4px;font-size:10px;flex-shrink:0">${sortIcon(col,s,d)}</span>`;
  const th=(col,lbl,w)=>`<th class="sort-th" data-sort-col="${col}" style="width:${w};cursor:pointer;user-select:none;padding:7px 8px;overflow:visible"><div style="display:flex;align-items:center;gap:2px;white-space:nowrap">${lbl}${sortSpan(col,S.listSort,S.listSortDir)}</div></th>`;

  function cellStatus(p){
    // Always inline-editable via custom dropdown
    return cSel("csl-st-"+p.id, BR_STATUS_OPTS(p), p.status, "_cbListStatus", {small:true, style:"width:100%;"});
  }
  function cellAssignee(p){
    return cSel("csl-asgn-"+p.id, MEMBER_OPTS(p.assignee), p.assignee||"", "_cbListAssignee", {small:true, style:"width:100%;"});
  }
  function cellRev(p){
    return cSel("csl-rev-"+p.id, REV_OPTS_INLINE(), p.rev||"-", "_cbListRev", {small:true, mono:true, style:"width:100%;"});
  }

  function partRow(p,i,forceRed){
    const obs=p.status==="Obsolete";
    const snCount=(p.serials||[]).length;
    const tqty=calcTotalQty(p.pn,S.parts);
    const needsMore=p.serialized&&tqty>0&&snCount<tqty;
    const nc=forceRed?"var(--red3)":obs?"var(--c-obsolete)":sColor(p.status);
    const _myRow=(p.assignee||"")===myName();
    return`<tr data-id="${p.id}" data-idx="${i}" class="${S.listFocus===i?"focused":""} ${obs?"list-obs":""} ${_myRow?"my-row":""}" tabindex="0" oncontextmenu="ctxListRow(event,'${p.id}')">
      <td style="font-family:var(--mono);font-size:12px"><span class="pn">${fullPN(p.pn,p.rev)}</span>${p.serialized?`<span class="serial-dot-btn ${needsMore?"serial-dot-warn":""}" data-id="${p.id}" style="color:var(--purple);font-size:11px;cursor:pointer;margin-left:4px">●</span>`:""}</td>
      <td style="font-weight:600;color:${nc};overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(p.name)}">${esc(p.name)}</td>
      <td>${cellStatus(p)}</td><td class="${_myRow?"my-asgn-cell":""}">${cellAssignee(p)}</td><td>${cellRev(p)}</td>
      ${(()=>{const _r=rollup(p.id,S.parts);return`<td style="font-family:var(--mono);font-size:12px" title="Own: ${fmtC(p.matCost||0)} · Rollup includes children">${fmtC(_r.cost)}</td><td style="font-family:var(--mono);font-size:12px" title="Own: ${fmtM(parseFloat(p.mass)||0)} · Rollup includes children">${fmtM(_r.mass)}</td>`;})()}
      <td style="font-size:12px;color:var(--text2)">${p.location||"—"}</td>
      <td style="font-family:var(--mono);font-size:12px;color:${p.serialized?"var(--purple-text)":"var(--text3)"}">${p.serialized?`<span class="serial-dot-btn" data-id="${p.id}" style="cursor:pointer;color:var(--purple-text)">${snCount}</span>`:"—"}</td>
      <td><div style="display:flex;gap:2px;justify-content:flex-end">
        ${!isMemberOnly()?`<button class="btn icon btn-edit-row" data-id="${p.id}">${I.edit}</button>`:""}
        <button class="btn icon btn-credits-row" data-id="${p.id}" title="View Credits">${I.credits}</button>
        ${!isMemberOnly()?`<button class="btn icon danger btn-del-row" data-id="${p.id}">${I.trash}</button>`:""}
      </div></td>
    </tr>`;
  }

  const tableHead=()=>`<div class="tbl-wrap"><table>
    <thead><tr>
      ${th("pn","Part #","11%")}${th("name","Name","16%")}
      ${th("status","Status","13%")}${th("assignee","Assignee","12%")}${th("rev","Rev","5%")}
      ${th("matCost","Cost","7%")}${th("mass","Mass (lb)","7%")}
      ${th("location","Location","9%")}
      <th style="width:9%;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">S# Count</th>
      <th style="width:11%"></th>
    </tr></thead><tbody id="list-tbody">`;

  return`<div class="card">
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
      ${(()=>{const pcOpts=[{value:"",label:"All Project Codes"},...(S.projectCodes||[]).map(pc=>({value:pc.code,label:fmtProjCode(pc.code,pc.name)}))];return cSel("list-proj-filter",pcOpts,S.listProjectFilter||"","_cbListProjFilter",{style:"width:180px"});})()}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <input id="si" placeholder="Search parts…" value="${S.search}" autocomplete="off" style="flex:1;min-width:140px;padding:7px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px">
      <button class="btn sm ${hasFilter?"primary":""}" id="btn-list-filter">${I.filter} Filter${hasFilter?" (on)":""}</button>
    </div>
    ${hasFilter?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">
      ${f.status?`<span class="filter-chip">Status: ${f.status} <span class="rm-filter" data-key="status" style="cursor:pointer;margin-left:4px">✕</span></span>`:""}
      ${f.assignee?`<span class="filter-chip">Assignee: ${f.assignee} <span class="rm-filter" data-key="assignee" style="cursor:pointer;margin-left:4px">✕</span></span>`:""}
      ${f.location?`<span class="filter-chip">Location: ${f.location} <span class="rm-filter" data-key="location" style="cursor:pointer;margin-left:4px">✕</span></span>`:""}
    </div>`:""}
    ${unplacedParts.length?`<div style="margin-bottom:14px;border:1px solid var(--red3);border-radius:var(--r);overflow:hidden">
      <div style="background:#1e0808;padding:7px 12px;font-size:11px;font-weight:700;color:var(--red3);text-transform:uppercase;letter-spacing:.08em">Unplaced Parts (${unplacedParts.length})</div>
      ${tableHead()}${unplacedParts.map((p,i)=>partRow(p,i,true)).join("")}</tbody></table></div>
    </div>`:""}
    ${tableHead()}${placedParts.map((p,i)=>partRow(p,i,false)).join("")}</tbody></table></div>
    ${obsoleteParts.length?`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">

function dueDateStyle(dueDate){
  if(!dueDate)return{icon:"",style:""};
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(dueDate);due.setHours(0,0,0,0);
  const diff=(due-today)/(1000*60*60*24);
  if(diff<0)return{icon:`<span style="color:var(--red3);font-weight:700;margin-left:4px" title="Overdue">⚠</span>`,style:"color:var(--red3);font-weight:600"};
  if(diff<=1)return{icon:`<span style="color:var(--amber-text);font-weight:700;margin-left:4px" title="Due soon">⚠</span>`,style:"color:var(--amber-text);font-weight:600"};
  return{icon:"",style:"color:var(--text2)"};
}
function buildMfgView(){
  const f=S.mfgFilter,s=S.search.toLowerCase();


  let allOrders=S.mfgOrders.filter(o=>{

    if(f.status&&o.status!==f.status)return false;
    if(f.assignee&&!o.assignee?.toLowerCase().includes(f.assignee.toLowerCase()))return false;
    return true;
  });


  const hasFilter=Object.values(f).some(Boolean);

  const mfgTh=(col,lbl,w)=>`<th class="mfg-sort-th" data-sort-col="${col}" style="padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;user-select:none;text-align:left;width:${w};overflow:visible"><div style="display:flex;align-items:center;gap:2px;white-space:nowrap">${lbl}<span style="color:${S.mfgSort===col?"var(--red3)":"var(--text3)"};font-size:10px;flex-shrink:0">${S.mfgSort===col?(S.mfgSortDir===1?"↑":"↓"):"↕"}</span></div></th>`;
  const _mth=(lbl,w)=>`<th style="padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:${w}">${lbl}</th>`;

    ${mfgTh("mfgNum","Order #","7%")}${_mth("Srl?","4%")}

    ${mfgTh("status","Status","14%")}${mfgTh("assignee","Assignee","12%")}
    ${mfgTh("dueDate","Due Date","8%")}
    ${mfgTh("qty","Qty","4%")}${mfgTh("revision","Rev","4%")}${mfgTh("material","Material","9%")}

      <td style="font-family:var(--mono);font-size:12px;color:var(--text)">
        ${o.partPn?fullPN(o.partPn,o.partRev||"-"):"—"}

      </div></td>

  return`<div class="card">

      <button class="btn sm ${hasFilter?"primary":""}" id="btn-mfg-filter">${I.filter} Filter${hasFilter?" (on)":""}</button>

      const mfgSortFn=(a,b)=>{

        {key:"Needs Inspection",color:"#22c55e",label:"Needs Inspection"},
        {key:"On Hold",color:"#f09595",label:"On Hold"},
        {key:"Complete",color:"#3b82f6",label:"Completed"},

      let html="";
      if(overdueOrders.length)html+=`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;color:var(--red3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--red3)">⚠ Overdue (${overdueOrders.length})</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:900px">${thead}<tbody>${overdueOrders.map(mfgRow).join("")}</tbody></table></div></div>`;

        const sec=[...allOrders.filter(o=>o.status===key)].sort(mfgSortFn);
        const th=key==="Complete"?theadComplete:thead;
        if(sec.length)html+=`<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">${label} (${sec.length})</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:900px">${th}<tbody>${sec.map(mfgRow).join("")}</tbody></table></div></div>`;
      });
      if(!allOrders.length)html=`<div style="text-align:center;padding:30px;color:var(--text3)">No manufacturing orders yet.</div>`;
      return html;
    })()}
  </div>`;
}

                  <td style="padding:5px 8px;color:var(--text2)">${sn.condition||"—"}</td>
                  <td style="padding:5px 8px;color:var(--text3)">${sn.notes||""}</td>
                </tr>`;
              }).join("")}
              ${!serials.length?`<tr><td colspan="4" style="padding:10px 8px;color:var(--text3)">No serials registered.</td></tr>`:""}
              </tbody>
            </table>
          </td></tr>`:""}`;
        }).join("")}
        </tbody>
      </table></div>`
      :`<div class="tbl-wrap"><table>
        <thead><tr>
          <th style="width:14%">Part Number</th><th style="width:20%">Name</th><th style="width:12%">Manufacturer</th>
          <th style="width:12%">Location</th><th style="width:9%">Status</th>
          <th style="width:8%">Needed</th><th style="width:10%">In Storage</th><th style="width:15%">Update Storage</th>
        </tr></thead>
        <tbody>
        ${sortedOem.map(p=>{
          const tqty=calcTotalQty(p.pn,S.parts);
          return`<tr data-id="${p.id}">
            <td style="font-family:var(--mono);font-size:12px"><span class="pn oem">${p.pn}</span></td>
            <td style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(p.name)}">${esc(p.name)}</td>
            <td style="font-size:12px;color:var(--text2)">${p.manufacturer||"—"}</td>
            <td style="font-size:12px;color:var(--text2)">${p.location||"—"}</td>
            <td>${sBadge(p.status)}</td>
            <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${tqty||"—"}</td>
            <td style="font-family:var(--mono);font-size:12px;color:var(--text2)">${p.storageQty||0}</td>
            <td><div style="display:flex;align-items:center;gap:6px">
              <input type="number" min="0" value="${p.storageQty||0}" class="inv-qty-input" data-id="${p.id}"
                style="width:70px;padding:4px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--mono);font-size:13px">
              <button class="btn sm inv-qty-save" data-id="${p.id}">Save</button>
            </div></td>
          </tr>`;
        }).join("")}
        </tbody>
      </table></div>`}
    </div>
  </div>`;
}

  document.getElementById("btn-oem-filter")?.addEventListener("click",()=>openFilterDialog("oem"));

  document.querySelectorAll(".dm-sort-th").forEach(th=>{th.addEventListener("click",()=>{const col=th.dataset.sortCol;if(S.dmSort===col)S.dmSortDir*=-1;else{S.dmSort=col;S.dmSortDir=1;}render();});});

  document.querySelectorAll(".dm-sub-card").forEach(card=>{
    card.addEventListener("click",()=>{

      const idx=path.indexOf(pn);
      if(idx>=0){
        // Clicking a card already in the path: truncate to one level above it (unisolate that level)
        S.dmSubPath=path.slice(0,idx);
      }else{
        // Clicking a new child: append to path
        S.dmSubPath=[...path,pn];

      if(root)S.expanded[root.id]=true;
      getAllDescendants(rootPn,S.parts).forEach(p=>{if(!p.isOem)S.expanded[p.id]=true;});
    }
    saveExpanded();render();
  });
  document.getElementById("tree-collapse-all")?.addEventListener("click",()=>{

  document.getElementById("detail-credits")?.addEventListener("click",()=>{if(S.selected)openCreditsDialog("part",S.selected.id);});
  document.getElementById("detail-del")?.addEventListener("click",()=>promptDelete(S.selected?.id));

  document.getElementById("detail-mass-chart")?.addEventListener("click",()=>{if(S.selected&&hasKids(S.selected.pn,S.parts))openPieChart(S.selected.id,"mass");});
  document.querySelectorAll(".cl-item").forEach(el=>{el.addEventListener("click",e=>{if(e.type!=="contextmenu"){S.selected=S.parts.find(x=>x.id===el.dataset.id);render();}});});
  document.querySelectorAll(".tree-chart-btn").forEach(el=>{el.addEventListener("click",e=>{e.stopPropagation();openPieChart(el.dataset.id,el.dataset.metric);});});
  bindCSel();
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"){if(_csState.current){_csClose();return;}closeAllDlg();document.getElementById("ctx-popup")?.remove();document.getElementById("sn-popup")?.remove();return;}
    if(S.view==="list"&&!document.querySelector("dialog[open]")&&(e.key==="ArrowDown"||e.key==="ArrowUp")&&document.activeElement?.id!=="si"){
      e.preventDefault();const rows=document.querySelectorAll("#list-tbody tr"),max=rows.length-1;
      if(e.key==="ArrowDown")S.listFocus=Math.min(S.listFocus+1,max);else S.listFocus=Math.max(S.listFocus-1,0);render();
    }
  },{once:true});
}

window.ctxListRow=function(e,id){

  const p=S.parts.find(x=>x.id===id);
  const items=[{label:"Edit Part",icon:I.edit,fn:()=>openEdit(id)},{label:"View Credits",icon:I.credits,fn:()=>openCreditsDialog("part",id)}];
  if(p&&p.serialized)items.push({label:"Manage Serials",icon:I.serial,fn:()=>openSerialModal(id)});
  items.push({divider:true},{label:"Delete",icon:I.trash,danger:true,fn:()=>promptDelete(id)});
  openCtxMenu(e,items);
};

window.ctxMfgRow=function(e,id){e.preventDefault();if(isMemberOnly()){openCtxMenu(e,[{label:"View Credits",icon:I.credits,fn:()=>openCreditsDialog("mfg",id)}]);return;}openCtxMenu(e,[{label:"Edit Order",icon:I.edit,fn:()=>openMfgForm(id)},{label:"View Credits",icon:I.credits,fn:()=>openCreditsDialog("mfg",id)},{divider:true},{label:"Delete",icon:I.trash,danger:true,fn:()=>promptDeleteMfg(id)}]);};
window.ctxDetailComp=function(e,compId,parentPn){
  e.preventDefault();e.stopPropagation();
  const comp=S.parts.find(x=>x.id===compId);if(!comp)return;
  openCtxMenu(e,[{label:"Edit Part",icon:I.edit,fn:()=>comp.isOem?openEditOem(compId):openEdit(compId)},{label:"Edit Quantity",icon:I.edit,fn:()=>openEditQtyDialog(compId,parentPn)},{label:"Remove Component",icon:I.remove,fn:()=>removeFromAssembly(compId,parentPn)}]);
};
function openCtxTree(e,id){
  const p=S.parts.find(x=>x.id===id);if(!p)return;
  if(isMemberOnly()){openCtxMenu(e,[{label:"View Credits",icon:I.credits,fn:()=>openCreditsDialog("part",id)}]);return;}
  const treeRow=e.target.closest(".tree-node"),parentNode=treeRow?.parentElement?.closest(".tree-node");
  const parentPart=parentNode?.dataset?.id?S.parts.find(x=>x.id===parentNode.dataset.id):null;
  const parentPn=parentPart?.pn||"";
  const inParent=parentPn&&(p.whereUsed||[]).some(w=>w.parentPn===parentPn);
  openCtxMenu(e,[
    {label:"Edit Part",icon:I.edit,fn:()=>p.isOem?openEditOem(id):openEdit(id)},
    ...(!p.isOem?[{label:"View Credits",icon:I.credits,fn:()=>openCreditsDialog("part",id)}]:[]),
    ...(S.isolatedTreeRoot===p.pn?[{label:"Unisolate",icon:I.x,fn:()=>{S.isolatedTreeRoot="";render();}}]:[{label:"Isolate",icon:"◎",fn:()=>{S.isolatedTreeRoot=p.pn;S.expanded[p.id]=true;saveExpanded();render();}}]),
    ...(!p.isOem?[
      {divider:true},
      {label:"Add Existing BR Part",icon:I.plus,fn:()=>openAddComponentDialog(p.pn,"br")},
      {label:"Add Existing OEM Part",icon:I.oem,fn:()=>openAddComponentDialog(p.pn,"oem")},
      {divider:true},
      {label:"Create New BR Part",icon:I.plus,fn:()=>openEdit(null,p.pn)},
      {label:"Create New OEM Part",icon:I.oem,fn:()=>openEditOem(null,p.pn)},
    ]:[]),
    ...(p.serialized?[{label:"Manage Serials",icon:I.serial,fn:()=>openSerialModal(id)}]:[]),
    ...(inParent?[{divider:true},{label:"Remove from Assembly",icon:I.remove,amber:true,fn:()=>removeFromAssembly(id,parentPn)}]:[]),
  ]);
}
function openCtxMenu(e,items){
  document.getElementById("ctx-popup")?.remove();
  const m=document.createElement("div");m.id="ctx-popup";
  m.style.cssText=`position:fixed;left:${Math.min(e.clientX,window.innerWidth-220)}px;top:${Math.min(e.clientY,window.innerHeight-240)}px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:4px;min-width:210px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.8)`;
  m.innerHTML=items.map(it=>it.divider?`<div style="height:1px;background:var(--border);margin:3px 0"></div>`:`<div class="ctx-item ${it.danger?"danger":""}" style="${it.amber?"color:var(--amber-text)":""}">${it.icon||""} <span>${it.label}</span></div>`).join("");
  document.body.appendChild(m);
  m.querySelectorAll(".ctx-item").forEach((el,i)=>{const item=items.filter(x=>!x.divider)[i];el.addEventListener("click",()=>{m.remove();if(item?.fn)item.fn();});});
  setTimeout(()=>document.addEventListener("click",()=>m.remove(),{once:true}),10);
}

function openFilterDialog(type){
  const fObj=type==="list"?S.listFilter:type==="oem"?S.oemFilter:type==="mfg"?S.mfgFilter:type==="dm"?S.dmFilter:S.invFilter;
  const allLocations=[...new Set(S.parts.map(p=>p.location).filter(Boolean))].sort();
  const allAssignees=[...new Set([...S.parts.map(p=>p.assignee),...S.mfgOrders.map(o=>o.assignee)].filter(Boolean))].sort();
  const allMfrs=[...new Set(S.parts.filter(p=>p.isOem).map(p=>p.manufacturer).filter(Boolean))].sort();
  let fields="";
  if(type==="list"||type==="inv"){
    fields+=`<div class="f"><label>Status</label>${cSelHTML("f-status", [{value:"",label:"— Any —"},...BR_STATUS_OPTS()], fObj.status||"", "_noop")}</div>`;
    if(type==="list")fields+=`<div class="f"><label>Assignee</label>${cSelHTML("f-assignee", MEMBER_OPTS_ANY(fObj.assignee), fObj.assignee||"", "_noop")}</div>`;
    fields+=`<div class="f"><label>Location</label>${cSelHTML("f-location", [{value:"",label:"— Any —"},...allLocations.map(l=>({value:l,label:l}))], fObj.location||"", "_noop")}</div>`;
  }
  if(type==="oem"){
    fields+=`<div class="f"><label>Manufacturer</label>${cSelHTML("f-manufacturer", [{value:"",label:"— Any —"},...allMfrs.map(m=>({value:m,label:m}))], fObj.manufacturer||"", "_noop")}</div>`;
    fields+=`<div class="f"><label>Status</label>${cSelHTML("f-status", [{value:"",label:"— Any —"},...OEM_STATUS_OPTS()], fObj.status||"", "_noop")}</div>`;
    fields+=`<div class="f"><label>Location</label>${cSelHTML("f-location", [{value:"",label:"— Any —"},...allLocations.map(l=>({value:l,label:l}))], fObj.location||"", "_noop")}</div>`;
  }
  if(type==="mfg"){
    fields+=`<div class="f"><label>Status</label>${cSelHTML("f-status", [{value:"",label:"— Any —"},...MFG_STATUS_OPTS()], fObj.status||"", "_noop")}</div>`;
    fields+=`<div class="f"><label>Assignee</label>${cSelHTML("f-assignee", MEMBER_OPTS_ANY(fObj.assignee), fObj.assignee||"", "_noop")}</div>`;
  }
  if(type==="dm"){
    fields+=`<div class="f"><label>Status</label>${cSelHTML("f-status", [{value:"",label:"— Any —"},...BR_STATUS_OPTS()], fObj.status||"", "_noop")}</div>`;
    fields+=`<div class="f"><label>Assignee</label>${cSelHTML("f-assignee", MEMBER_OPTS_ANY(fObj.assignee), fObj.assignee||"", "_noop")}</div>`;
    fields+=`<div class="f"><label>Revision</label>${cSelHTML("f-rev", [{value:"",label:"— Any —"},...REV_OPTS_INLINE()], fObj.rev||"", "_noop")}</div>`;
  }
  const d=openDlg("filter","min(380px,96vw)",`
  <div class="dh"><div class="dh-title">${I.filter} Filter</div><button id="f-x" class="btn icon" style="margin-left:auto">${I.x}</button></div>
  <div class="db">${fields}</div>
  <div class="df"><button id="f-clear" class="btn">Clear All</button><button id="f-cancel" class="btn">Cancel</button><button id="f-apply" class="btn primary">Apply</button></div>`);
  d.querySelector("#f-x").addEventListener("click",()=>closeDlg("filter"));
  d.querySelector("#f-cancel").addEventListener("click",()=>closeDlg("filter"));
  d.querySelector("#f-clear").addEventListener("click",()=>{if(type==="list")S.listFilter={};else if(type==="oem")S.oemFilter={};else if(type==="mfg")S.mfgFilter={};else if(type==="dm")S.dmFilter={};else S.invFilter={};closeDlg("filter");render();});
  d.querySelector("#f-apply").addEventListener("click",()=>{
    const obj={};
    ["status","assignee","location","manufacturer","rev"].forEach(k=>{const v=cSelVal(`f-${k}`);if(v&&v!=="— Any —")obj[k]=v;});
    if(type==="list")S.listFilter=obj;else if(type==="oem")S.oemFilter=obj;else if(type==="mfg")S.mfgFilter=obj;else if(type==="dm")S.dmFilter=obj;else S.invFilter=obj;
    closeDlg("filter");render();
  });
}
