      ${roster.map(n=>`<option value="${esc(n)}" ${n===viewUser?"selected":""}>${esc(n)}</option>`).join("")}
    </select>
  </div>`:"";

  const totalActive=myParts.filter(p=>!["Manufactured"].includes(p.status)).length;
  const totalMfg=myOrders.length;

  return`<div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-size:20px;font-weight:800;color:#22d3ee">${prefix} Dashboard</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${totalActive} active part${totalActive!==1?"s":""} · ${totalMfg} open order${totalMfg!==1?"s":""}</div>
        </div>
        <div style="flex:1"></div>
        ${userPicker}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:14px 16px 10px;font-size:14px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border)">${prefix} Design Tasks</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;table-layout:fixed">
            <thead><tr>${thP("pn","Part #","28%")}${thP("name","Name","36%")}${thP("status","Status","22%")}${thP("due","Due","14%")}</tr></thead>
            <tbody>${partRows||`<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--text3);font-size:13px">No active design tasks.</td></tr>`}</tbody>
          </table>
        </div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:14px 16px 10px;font-size:14px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border)">${prefix} Manufacturing Orders</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;table-layout:fixed">
            <thead><tr>${thO("mfgNum","Order #","22%")}${thO("name","Part","40%")}${thO("status","Status","24%")}${thO("due","Due","14%")}</tr></thead>
            <tbody>${orderRows||`<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--text3);font-size:13px">No open manufacturing orders.</td></tr>`}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

function buildDmView(){
  // Scope to descendants of the major assembly if configured
  const _allBR=S.parts.filter(p=>!p.isOem&&p.status!=="Obsolete");
  const _majorScoped=S.majorAssy
    ?[...new Map([...getAllDescendants(S.majorAssy,S.parts)].filter(p=>!p.isOem&&p.status!=="Obsolete").map(p=>[p.id,p])).values()]
    :_allBR;
  // Further scope to selected sub-assembly and its descendants
  const brParts=S.dmSubFilter
    ?(()=>{
      const subAnchor=S.parts.find(p=>p.pn===S.dmSubFilter);
      if(!subAnchor)return _majorScoped;
      const desc=[...new Map([subAnchor,...getAllDescendants(S.dmSubFilter,S.parts)].filter(p=>!p.isOem&&p.status!=="Obsolete").map(p=>[p.id,p])).values()];
      return desc;
    })()
    :_majorScoped;
  // Sub-filter anchor part (pinned to top of list)
  const subAnchorPart=S.dmSubFilter?S.parts.find(p=>p.pn===S.dmSubFilter):null;
  // Main progress bar always uses full major-scoped set (unaffected by sub-filter)
  const _barParts=_majorScoped;
  const total=_barParts.length;
  const counts={
    Manufactured:_barParts.filter(p=>p.status==="Manufactured").length,
    "Design Approved":_barParts.filter(p=>p.status==="Design Approved").length,
    "Needs Revision":_barParts.filter(p=>p.status==="Needs Revision").length,
    "Needs Review":_barParts.filter(p=>p.status==="Needs Review").length,
    "In Design":_barParts.filter(p=>p.status==="In Design").length,
  };
  const approved=counts["Manufactured"]+counts["Design Approved"];
  const approvedPct=total?approved/total*100:0;

  // Progress bar segments: blue, green, purple, yellow, gray
  const segments=[
    {key:"Manufactured",color:"var(--c-mfg)",label:"Manufactured"},
    {key:"Design Approved",color:"var(--c-approved)",label:"Design Approved"},
    {key:"Needs Revision",color:"var(--c-revision)",label:"Needs Revision"},
    {key:"Needs Review",color:"var(--c-review)",label:"Needs Review"},
    {key:"In Design",color:"var(--c-indesign)",label:"In Design"},
  ];

  const barSegs=segments.map(seg=>{
    const pct=total?counts[seg.key]/total*100:0;
    if(pct===0)return"";
    return`<div class="dm-seg" data-label="${seg.label}: ${counts[seg.key]} parts (${pct.toFixed(1)}%)" style="width:${pct}%;background:${seg.color};height:100%;transition:width .5s;position:relative" title="${seg.label}: ${counts[seg.key]} (${pct.toFixed(1)}%)"></div>`;
  }).join("");

  // Deadlines
  const today=new Date();today.setHours(0,0,0,0);
  const upcomingDl=(S.deadlines||[])
    .filter(d=>!d.completed)
    .sort((a,b)=>(parseLocalDate(a.date)||0)-(parseLocalDate(b.date)||0));
  const nextDl=upcomingDl[0];

  function dlCard(d,big){
    const dueDate=parseLocalDate(d.date);if(!dueDate)return"";
    const days=Math.ceil((dueDate-today)/864e5);
    const isToday=days===0,isTomorrow=days===1||days===2;
    const color=days<=0?"var(--red3)":isTomorrow?"var(--amber-text)":"var(--text)";
    const fmtDate=dueDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    const bgStyle=isToday?"background:#9e1b32;border-color:#9e1b32":isTomorrow?"background:var(--bg3);border-color:var(--border2);animation:dl-pulse 2s ease-in-out infinite":"background:var(--bg3);border-color:var(--border2)";
    const textColor=isToday||isTomorrow?"#fff":color;
    return big
      ?`<div style="${bgStyle};border:1px solid;border-radius:var(--rl);padding:18px 22px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="font-size:10px;font-weight:700;color:${isToday||isTomorrow?"rgba(255,255,255,.7)":"var(--text3)"};text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Next Major Deadline</div>
            <button class="btn sm dl-complete-btn" data-dl-name="${d.name}" style="font-size:11px;padding:3px 8px;${isToday||isTomorrow?"background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)":""}">✓ Done</button>
          </div>
          <div style="font-size:22px;font-weight:800;color:${textColor};margin-bottom:4px">${d.name}</div>
          <div style="font-size:14px;color:${isToday||isTomorrow?"rgba(255,255,255,.85)":"var(--text2)"}">${fmtDate} · <span style="font-weight:600">${days>0?days+" days left":days===0?"Today":"Overdue"}</span></div>
        </div>`
      :`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;${bgStyle};border:1px solid;border-radius:var(--r);margin-bottom:6px">
          <div style="font-size:14px;font-weight:600;color:${textColor}">${d.name}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:12px;color:${isToday||isTomorrow?"rgba(255,255,255,.8)":"var(--text2)"}">${fmtDate} · <span>${days>0?days+"d":days===0?"Today":"Overdue"}</span></div>
            <button class="btn sm dl-complete-btn" data-dl-name="${d.name}" style="font-size:11px;padding:3px 8px;${isToday?"background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)":""}">✓ Done</button>
          </div>
        </div>`;
  }

  // Parts list by status
  const f=S.dmFilter;
  const s=S.search.toLowerCase();
  const filtered=brParts.filter(p=>{
    if(s&&!(p.pn+p.name+(p.assignee||"")).toLowerCase().includes(s))return false;
    if(f.status&&p.status!==f.status)return false;
    if(f.assignee&&!p.assignee?.toLowerCase().includes(f.assignee.toLowerCase()))return false;
    return true;
  });
  const sortFn=(a,b)=>{let av=a[S.dmSort]||"",bv=b[S.dmSort]||"";return(av<bv?-1:av>bv?1:0)*S.dmSortDir;};
  // Exclude the sub-assembly anchor from status sections (it's pinned at top)
  const filtered2=subAnchorPart?filtered.filter(p=>p.pn!==S.dmSubFilter):filtered;
  const overdue=filtered2.filter(p=>isOverdue(p)).sort(sortFn);
  const hasFilter=Object.values(f).some(Boolean);

  // Group remaining by status in display order
  const statusOrder=["In Design","Needs Review","Design Approved","Manufactured","Needs Revision"];
  const byStatus={};
  statusOrder.forEach(st=>{byStatus[st]=filtered2.filter(p=>p.status===st).sort(sortFn);});

  function partRow(p){
    const orp=isOrphan(p,S.parts)||isUnplaced(p);
    const nameColor=orp?"var(--red3)":sColor(p.status);
    const dd=dueDateStyle2(p.designDueDate);
    const inlineStatus=cSel("cdm2-st-"+p.id, BR_STATUS_OPTS(p), p.status, "_cbListStatus", {small:true, style:"width:100%;"});
    const inlineAssignee=cSel("cdm2-asgn-"+p.id, MEMBER_OPTS(p.assignee), p.assignee||"", "_cbListAssignee", {small:true, style:"width:100%;"});
    const inlineRev=cSel("cdm2-rev-"+p.id, REV_OPTS_INLINE(), p.rev||"-", "_cbListRev", {small:true, mono:true, style:"width:100%;"});
    return`<tr data-id="${p.id}" class="${(p.assignee||"")===myName()?"my-row":""}" oncontextmenu="ctxListRow(event,'${p.id}')">
      <td style="font-family:var(--mono);font-size:12px"><span class="pn">${fullPN(p.pn,p.rev)}</span></td>
      <td style="font-weight:600;color:${nameColor};overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(p.name)}">${esc(p.name)}</td>
      <td class="${(p.assignee||"")===myName()?"my-asgn-cell":""}">${inlineAssignee}</td>
      <td>${inlineStatus}</td>
      <td>${inlineRev}</td>
      <td style="font-size:12px;${dd.style||'color:var(--text)'}">${p.designDueDate||"—"}${dd.icon}</td>
      <td><div style="display:flex;gap:2px;justify-content:flex-end">${!isMemberOnly()?`<button class="btn icon btn-edit-row" data-id="${p.id}">${I.edit}</button>`:""}<button class="btn icon btn-credits-row" data-id="${p.id}" title="View Credits">${I.credits}</button></div></td>
    </tr>`;
  }

  const dmTh=(col,lbl,w)=>`<th class="dm-sort-th" data-sort-col="${col}" style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;user-select:none;width:${w};overflow:visible"><div style="display:flex;align-items:center;gap:2px;white-space:nowrap">${lbl}<span style="color:${S.dmSort===col?"var(--red3)":"var(--text3)"};font-size:10px;flex-shrink:0">${S.dmSort===col?(S.dmSortDir===1?"↑":"↓"):"↕"}</span></div></th>`;
  const tableHead=`<table style="width:100%;border-collapse:collapse;table-layout:fixed"><thead><tr>
    ${dmTh("pn","Part #","12%")}${dmTh("name","Name","23%")}${dmTh("assignee","Assignee","16%")}${dmTh("status","Status","16%")}${dmTh("rev","Rev","6%")}${dmTh("designDueDate","Design Due","13%")}
    <th style="width:8%"></th>
  </tr></thead>`;

  return`<div>
    <!-- MAJOR ASSY SELECTOR -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      ${(()=>{
        const topLevel=S.parts.filter(p=>!p.isOem&&(!p.whereUsed||p.whereUsed.length===0)&&!isLowCode(getProjCode(p.pn))).sort((a,b)=>a.pn.localeCompare(b.pn));
        // Deduplicate: one entry per project code, prefer master PN (XX000000) if it exists
        const codeMap=new Map();
        topLevel.forEach(p=>{const code=getProjCode(p.pn);if(!codeMap.has(code)||isMasterPN(p.pn))codeMap.set(code,p);});
        const dedupedTopLevel=[...codeMap.values()].sort((a,b)=>a.pn.localeCompare(b.pn));
        return cSel("dm-major-assy",[{value:"",label:"— All BR Parts —"},...dedupedTopLevel.map(p=>{const code=getProjCode(p.pn);const pc2=(S.projectCodes||[]).find(x=>x.code===code);const label=pc2?fmtProjCode(code,pc2.name):"BR"+code;return{value:p.pn,label};})],S.majorAssy||"","_cbDmMajorAssy",{style:"width:200px"});
      })()}
    </div>

    <!-- PROGRESS BAR -->
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:12px">
        <span style="font-size:48px;font-weight:900;color:var(--text);font-family:var(--mono);line-height:1">${approvedPct.toFixed(1)}%</span>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--text)">${approved} / ${total} Parts Designed</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">Manufactured + Design Approved</div>
        </div>
      </div>
      <div style="width:100%;height:28px;border-radius:14px;overflow:hidden;background:var(--bg4);display:flex;position:relative;border:1px solid var(--border)">
        ${total?barSegs:`<div style="width:100%;background:var(--bg4);height:100%"></div>`}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:10px">
        ${segments.map(seg=>counts[seg.key]?`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><div style="width:10px;height:10px;border-radius:2px;background:${seg.color};flex-shrink:0"></div><span style="color:var(--text2)">${seg.label}: ${counts[seg.key]} (${total?(counts[seg.key]/total*100).toFixed(1):"0.0"}%)</span></div>`:"").filter(Boolean).join("")}
      </div>
    </div>

    <!-- DEADLINES -->
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:15px;font-weight:700">Major Deadlines</div>
        <button class="btn sm" id="btn-edit-deadlines">${I.edit} Edit Deadlines</button>
      </div>
      ${nextDl?dlCard(nextDl,true):`<div style="color:var(--text3);font-size:13px;padding:12px 0">No upcoming deadlines.</div>`}
      ${upcomingDl.slice(1,4).map(d=>dlCard(d,false)).join("")}
    </div>

    <!-- SUB-ASSEMBLY BREAKDOWN -->
    ${(()=>{
      // Card builder for any assembly part
      function buildSubCard(assy){
        const desc=getAllDescendants(assy.pn,S.parts).filter(p=>!p.isOem&&p.status!=="Obsolete");
        const allParts=[...new Map([...desc].map(p=>[p.id,p])).values()];
        const subTotal=allParts.length;
        const noChildren=subTotal===0;
        const subCounts={
          Manufactured:allParts.filter(p=>p.status==="Manufactured").length,
          "Design Approved":allParts.filter(p=>p.status==="Design Approved").length,
          "Needs Revision":allParts.filter(p=>p.status==="Needs Revision").length,
          "Needs Review":allParts.filter(p=>p.status==="Needs Review").length,
          "In Design":allParts.filter(p=>p.status==="In Design").length,
        };
        const subApproved=subCounts["Manufactured"]+subCounts["Design Approved"];
        const subPct=subTotal?subApproved/subTotal*100:0;
        const subSegs=[
          {key:"Manufactured",color:"var(--c-mfg)"},
          {key:"Design Approved",color:"var(--c-approved)"},
          {key:"Needs Revision",color:"var(--c-revision)"},
          {key:"Needs Review",color:"var(--c-review)"},
          {key:"In Design",color:"var(--c-indesign)"},
        ].map(seg=>{
          const pct=subTotal?subCounts[seg.key]/subTotal*100:0;
          if(pct===0)return"";
          return`<div class="dm-seg" style="width:${pct}%;background:${seg.color};height:100%;transition:width .4s;cursor:default" title="${seg.key}: ${subCounts[seg.key]} parts (${pct.toFixed(1)}%)"></div>`;
        }).join("");
        const dd2=assy.designDueDate?dueDateStyle2(assy.designDueDate):{style:"",icon:""};
        const isActive=(S.dmSubPath||[]).includes(assy.pn);
        return`<div class="dm-sub-card" data-pn="${assy.pn}" style="margin-bottom:0;padding:12px 14px;background:${isActive?"var(--bg4)":"var(--bg3)"};border:1px solid ${isActive?"var(--red3)":"var(--border)"};${noChildren?"opacity:.6":""};border-radius:var(--r);cursor:pointer;transition:border-color .15s,background .15s" title="${isActive?"Click to exit isolated view":"Click to isolate "+esc(assy.name)}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            ${isActive?`<span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--red3);background:#1e0808;border:1px solid var(--red3);border-radius:3px;padding:1px 5px;flex-shrink:0">Isolated</span>`:""}
            <div style="width:11px;height:11px;border-radius:50%;background:${sColor(assy.status)};flex-shrink:0;box-shadow:0 0 6px ${sColor(assy.status)}55"></div>
            <span style="font-family:var(--mono);font-size:11px;color:var(--text);flex-shrink:0">${fullPN(assy.pn,assy.rev)}</span>
            <span style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(assy.name)}</span>
            ${assy.assignee?`<span style="font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;${assy.assignee===myName()?"background:#0e7490;border:1px solid #0e7490;color:#fff;font-weight:700":"background:var(--bg4);border:1px solid var(--border2);color:var(--text2)"}">${esc(assy.assignee)}</span>`:""}
            <span style="flex:1"></span>
            <span style="font-family:var(--mono);font-size:15px;font-weight:800;color:${noChildren?"var(--text3)":"var(--text)"};flex-shrink:0">${noChildren?"—":subPct.toFixed(1)+"%"}</span>
            <span style="font-size:11px;color:var(--text3);flex-shrink:0">${noChildren?"—":subApproved+"/"+subTotal}</span>
            ${assy.designDueDate?`<span style="font-size:11px;flex-shrink:0;${dd2.style||"color:var(--text3)"}">· Due ${assy.designDueDate}${dd2.icon}</span>`:""}
          </div>
          <div style="width:100%;height:10px;border-radius:5px;overflow:hidden;background:var(--bg4);display:flex;border:1px solid var(--border);position:relative;${noChildren?"opacity:.35":""}">
            ${noChildren||!subTotal?`<div style="width:100%;background:var(--bg4);height:100%"></div>`:subSegs}
          </div>
        </div>`;
      }

      // Direct children of a parent PN (non-OEM); assemblies are isolatable, leaf parts just show status
      function childAssemblies(parentPn){
        return S.parts.filter(p=>
          !p.isOem&&p.status!=="Obsolete"&&
          (p.whereUsed||[]).some(w=>w.parentPn===parentPn)
        ).sort((a,b)=>{
          const ah=hasKids(a.pn,S.parts),bh=hasKids(b.pn,S.parts);
          if(ah!==bh)return ah?-1:1;
          return a.pn.localeCompare(b.pn);
        });
      }

      const topLevelParts=S.majorAssy
        ?S.parts.filter(p=>p.pn===S.majorAssy)
        :S.parts.filter(p=>!p.isOem&&(!p.whereUsed||p.whereUsed.length===0));
      const secondLevel=S.parts.filter(p=>
        !p.isOem&&p.status!=="Obsolete"&&(p.pn||"").slice(-4)==="0000"&&
        (p.whereUsed||[]).some(w=>topLevelParts.some(t=>t.pn===w.parentPn))
      ).sort((a,b)=>a.pn.localeCompare(b.pn));

      const path=(S.dmSubPath||[]).filter(pn=>S.parts.find(p=>p.pn===pn));
      if(!secondLevel.length&&!path.length)return"";

      // ISOLATED MODE: show each level of the breadcrumb path as a full-width isolated card,
      // then under the deepest level, show its children 2-wide.
      if(path.length){
        const levelCards=path.map(pn=>{
          const anchor=S.parts.find(p=>p.pn===pn);
          return anchor?buildSubCard(anchor):"";
        }).join('<div style="height:8px"></div>');
        const deepest=path[path.length-1];
        const anchor=S.parts.find(p=>p.pn===deepest);
        const kids=childAssemblies(deepest);
        const kidCards=kids.map(buildSubCard).join("");
        return`<div class="card" style="margin-bottom:12px">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">Sub-Assembly Progress <span style="font-size:11px;font-weight:400;color:var(--text3)">— click an isolated card to step back to it</span></div>
          ${levelCards}
          ${kids.length?`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Components of ${anchor.name} <span style="font-weight:400;text-transform:none;letter-spacing:0">— click an assembly to isolate further</span></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${kidCards}</div>
          </div>`:`<div style="margin-top:12px;font-size:12px;color:var(--text3)">No components under this part.</div>`}
        </div>`;
      }

      // NORMAL MODE: grid of all second-level cards, 2-wide
      const subCards=secondLevel.map(buildSubCard).join("");
      return`<div class="card" style="margin-bottom:12px">
        <div style="font-size:15px;font-weight:700;margin-bottom:12px">Sub-Assembly Progress <span style='font-size:11px;font-weight:400;color:var(--text3)'>— click a card to isolate</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${subCards}</div>
      </div>`;
    })()}

    <!-- PARTS LIST -->
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
        <input id="si" placeholder="Search parts…" value="${S.search}" autocomplete="off" style="flex:1;min-width:160px;padding:7px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px">
        <button class="btn sm ${hasFilter?"primary":""}" id="btn-dm-filter">${I.filter} Filter${hasFilter?" (on)":""}</button>
      </div>
      ${hasFilter?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">
        ${f.status?`<span class="filter-chip">Status: ${f.status} <span class="rm-dm-filter" data-key="status" style="cursor:pointer;margin-left:4px">✕</span></span>`:""}
        ${f.assignee?`<span class="filter-chip">Assignee: ${f.assignee} <span class="rm-dm-filter" data-key="assignee" style="cursor:pointer;margin-left:4px">✕</span></span>`:""}
      </div>`:""}

      ${subAnchorPart?`<div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">Sub-Assembly Root</div>
        <div class="tbl-wrap">${tableHead}<tbody>${partRow(subAnchorPart)}</tbody></table></div>
      </div>`:""}
      ${overdue.length?`<div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--red3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">⚠ Overdue (${overdue.length})</div>
        <div class="tbl-wrap">${tableHead}<tbody>${overdue.map(partRow).join("")}</tbody></table></div>
      </div>`:""}

      ${statusOrder.map(st=>byStatus[st].length?`<div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:${sColor(st)};text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">${st} (${byStatus[st].length})</div>
        <div class="tbl-wrap">${tableHead}<tbody>${byStatus[st].map(partRow).join("")}</tbody></table></div>
      </div>`:"").join("")}
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════
//  DEADLINES DIALOG
// ══════════════════════════════════════════════════
function openDeadlinesDialog(){
  function buildRows(dls){
    if(!dls.length)return`<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">No deadlines yet.</div>`;
    return dls.map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;${d.completed?"opacity:.5":""}" data-dl-idx="${i}">
      <input class="dl-name" type="text" autocomplete="off" value="${d.name||""}" placeholder="e.g. PDR"
        style="flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px;${d.completed?"text-decoration:line-through":""}">
      <input class="dl-date" type="date" value="${d.date||""}"
        style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px">
      <input class="dl-completed" type="checkbox" ${d.completed?"checked":""} title="Mark complete" style="width:16px;height:16px;cursor:pointer;accent-color:var(--red3)">
      <button class="btn icon danger dl-del" data-idx="${i}" type="button" style="padding:4px">${I.trash}</button>
    </div>`).join("");
  }

  const sortedDeadlines=[...(S.deadlines||[])].sort((a,b)=>(parseLocalDate(a.date)||0)-(parseLocalDate(b.date)||0));
  const d=openDlg("deadlines","min(520px,96vw)",`
  <div class="dh"><div class="dh-title">Edit Major Deadlines</div><button id="dl-x" class="btn icon" style="margin-left:auto">${I.x}</button></div>
  <div class="db">
    <div id="dl-rows">${buildRows(sortedDeadlines)}</div>
    <button id="dl-add" class="btn sm" type="button" style="margin-top:6px">${I.plus} Add Deadline</button>
  </div>
  <div class="df"><button id="dl-cancel" class="btn">Cancel</button><button id="dl-save" class="btn primary">Save</button></div>`);

  function collect(){return Array.from(d.querySelectorAll("[data-dl-idx]")).map(row=>({name:row.querySelector(".dl-name")?.value||"",date:row.querySelector(".dl-date")?.value||"",completed:row.querySelector(".dl-completed")?.checked||false})).filter(x=>x.name||x.date);}
  function rebind(){d.querySelectorAll(".dl-del").forEach(btn=>{btn.addEventListener("click",()=>{const dls=collect();dls.splice(parseInt(btn.dataset.idx),1);d.querySelector("#dl-rows").innerHTML=buildRows(dls);rebind();});});}
  rebind();
  d.querySelector("#dl-add").addEventListener("click",()=>{const dls=collect();dls.push({name:"",date:""});d.querySelector("#dl-rows").innerHTML=buildRows(dls);rebind();});
  d.querySelector("#dl-cancel").addEventListener("click",()=>closeDlg("deadlines"));
  d.querySelector("#dl-x").addEventListener("click",()=>closeDlg("deadlines"));
  d.querySelector("#dl-save").addEventListener("click",()=>{S.deadlines=collect().sort((a,b)=>(parseLocalDate(a.date)||0)-(parseLocalDate(b.date)||0));saveLocal(S.parts,S.mfgOrders);closeDlg("deadlines");render();});
}

// ══════════════════════════════════════════════════
//  OEM USED-IN DIALOG
// ══════════════════════════════════════════════════
function openOemUsedInDialog(id){
  const p=S.parts.find(x=>x.id===id);if(!p)return;
  const usages=(p.whereUsed||[]).map(w=>{const parent=S.parts.find(x=>x.pn===w.parentPn);return{pn:w.parentPn,rev:parent?.rev||"-",name:parent?.name||"Unknown",qty:w.qty};});
  const d=openDlg("oem-usedin","min(520px,96vw)",`
  <div class="dh"><div class="dh-title">${p.name} — Used In</div><button id="oui-x" class="btn icon" style="margin-left:auto">${I.x}</button></div>
  <div class="db">
    ${usages.length?`<table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:35%">Part Number</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Part Name</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:80px">Qty</th>
      </tr></thead>
      <tbody>${usages.map(u=>`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px;font-family:var(--mono);font-size:12px;color:var(--blue-text)">${fullPN(u.pn,u.rev)}</td>
        <td style="padding:8px;font-size:13px;font-weight:600">${u.name}</td>
        <td style="padding:8px;font-family:var(--mono);font-size:12px;color:var(--text2)">${u.qty}</td>
      </tr>`).join("")}</tbody>
    </table>`:`<div style="text-align:center;padding:20px;color:var(--text3)">Not used in any assembly.</div>`}
  </div>
  <div class="df"><button id="oui-close" class="btn">Close</button></div>`);
  d.querySelector("#oui-x").addEventListener("click",()=>closeDlg("oem-usedin"));
  d.querySelector("#oui-close").addEventListener("click",()=>closeDlg("oem-usedin"));
}

// ══════════════════════════════════════════════════
//  MFG BOM DIALOG — shows component list for assembly orders
// ══════════════════════════════════════════════════
// (mfg credits dialog removed)


function openAddDepDialog(partId){
  const part=S.parts.find(x=>x.id===partId);if(!part)return;
  const pool=S.parts.filter(x=>x.id!==partId&&!(part.dependencies||[]).includes(x.pn));
  const rows=buildDepRows([],pool);
  const d=openDlg("add-dep","min(520px,96vw)",`
  <div class="dh"><div class="dh-title">${I.plus} Add Dependency to ${esc(part.name)}</div><button id="adx" class="btn icon" style="margin-left:auto">${I.x}</button></div>
  <div class="db">
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Select a part this part depends on.</div>
    <div id="add-dep-con">${rows}</div>
  </div>
  <div class="df"><button id="ad-cancel" class="btn">Cancel</button><button id="ad-ok" class="btn primary">Add</button></div>`);
  d.querySelector("#adx").addEventListener("click",()=>closeDlg("add-dep"));
  d.querySelector("#ad-cancel").addEventListener("click",()=>closeDlg("add-dep"));
  const depCon=d.querySelector("#add-dep-con");
  bindDep(depCon,pool);
  d.querySelector("#ad-ok").addEventListener("click",()=>{
    const newDeps=collectDeps(depCon).filter(pn=>!(part.dependencies||[]).includes(pn));
    if(!newDeps.length){closeDlg("add-dep");return;}
    part.dependencies=[...(part.dependencies||[]),...newDeps];
    persistPart(part);closeDlg("add-dep");render();
  });
}

function openMfgBomDialog(orderId){
  const o=S.mfgOrders.find(x=>x.id===orderId);if(!o)return;
  const part=S.parts.find(x=>x.id===o.partId);if(!part)return;
  // Get direct children of this assembly
  const children=S.parts.filter(p=>(p.whereUsed||[]).some(w=>w.parentPn===part.pn));
  if(!children.length){alert("No components found for this assembly.");return;}

  const rows=children.sort((a,b)=>a.pn.localeCompare(b.pn)).map(p=>{
    const wu=(p.whereUsed||[]).find(w=>w.parentPn===part.pn);
    const qty=(wu?.qty||1)*o.qty;
    return`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px;font-family:var(--mono);font-size:12px;color:${p.isOem?"var(--blue-text)":"var(--text)"}">${fullPN(p.pn,p.rev)}</td>
      <td style="padding:8px;font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(p.name)}">${esc(p.name)}</td>
      <td style="padding:8px;font-family:var(--mono);font-size:12px;text-align:center;color:var(--text)">${wu?.qty||1}</td>
      <td style="padding:8px;font-family:var(--mono);font-size:12px;text-align:center;color:var(--amber-text)">${o.qty>1?qty:""}</td>
      <td style="padding:8px">${sBadge(p.status)}</td>
      <td style="padding:8px;font-size:12px;color:var(--text2)">${(()=>{
        const hasK=S.parts.some(x=>(x.whereUsed||[]).some(w=>w.parentPn===p.pn));
        return hasK?"ASSY":(p.material||"—");
      })()}</td>
    </tr>`;
  }).join("");

  const d=openDlg("mfg-bom","min(680px,96vw)",`
  <div class="dh">
    <div class="dh-title">BOM — ${fullPN(part.pn,part.rev)} ${part.name}</div>
    <span style="font-size:12px;color:var(--text3)">Order qty: ${o.qty}</span>
    <button id="bom-x" class="btn icon" style="margin-left:auto">${I.x}</button>
  </div>
  <div class="db" style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:500px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:15%">Part #</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Name</th>
        <th style="text-align:center;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:8%">Per</th>
        <th style="text-align:center;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:8%">Total</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:16%">Status</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;width:12%">Material</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="df"><button id="bom-close" class="btn">Close</button></div>`);
  d.querySelector("#bom-x").addEventListener("click",()=>closeDlg("mfg-bom"));
  d.querySelector("#bom-close").addEventListener("click",()=>closeDlg("mfg-bom"));
}
</script>
