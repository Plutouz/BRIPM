function openMfgForm(mfgId){
  if(isMemberOnly()){memberBlocked("Editing orders");return;}
  const existing=mfgId?S.mfgOrders.find(o=>o.id===mfgId):null;
  const o=existing?{...existing}:blankMfg("");
  const isNew=!existing;
  const brParts=S.parts.filter(p=>!p.isOem);
  const d=openDlg("mfg-form","min(700px,96vw)",`
  <div class="dh"><div class="dh-title">${isNew?"New Manufacturing Order":"Edit Manufacturing Order"}</div><button id="mf-x" class="btn icon">${I.x}</button></div>
  <div class="db">
    <div class="f"><label>Part</label>${partSearchHTML("mf-part", brParts, o.partId||"", "Search by PN or name…")}</div>
    <div class="f-row">
      <div class="f"><label>Status</label>${cSelHTML("mf-status", MFG_STATUS_OPTS(), o.status||"Open", "_noop")}</div>
      <div class="f"><label>Assignee</label>${cSelHTML("mf-assignee", MEMBER_OPTS(o.assignee), o.assignee||"", "_noop", {placeholder:"— Unassigned —"})}</div>
    </div>
    <div class="f-row">
      <div class="f"><label>Due Date</label><input id="mf-due" type="date" value="${o.dueDate||""}"></div>
      <div class="f"><label>Quantity</label><input id="mf-qty" type="number" min="1" value="${o.qty||1}" autocomplete="off"></div>
    </div>
    <div class="f-row">
      <div class="f"><label>Revision</label>${cSelHTML("mf-rev", REV_OPTS_LIST(), o.revision||"-", "_noop", {mono:true})}</div>
      <div class="f"><label>Material</label><input id="mf-mat" type="text" autocomplete="off" value="${o.material||""}" placeholder="e.g. 7075-T6 Al"></div>
    </div>
    <div class="f-row">
      <div class="f"><label>Stock Number(s)</label><input id="mf-stock" type="text" autocomplete="off" value="${o.stockNos||""}" placeholder="e.g. STK-001, STK-002" style="font-family:var(--mono)"></div>
      <div class="f"><label>Storage Location</label><input id="mf-loc" type="text" autocomplete="off" value="${o.storageLocation||""}" placeholder="e.g. Shelf A2"></div>
    </div>
    <div class="f"><label>Notes</label><textarea id="mf-notes" autocomplete="off">${o.notes||""}</textarea></div>
  </div>
  <div class="df"><button id="mf-cancel" class="btn">Cancel</button><button id="mf-save" class="btn primary">${isNew?"Create Order":"Save Changes"}</button></div>`,{backdropClose:false});

  // Register mf-part callback to trigger component refresh
  window._cbMfPartChange=(val)=>{updateFromPart(val);updateSerializedComponentFields();};

  function updateFromPart(partId){
    const p=S.parts.find(x=>x.id===partId);if(!p)return;
    const hasKids=S.parts.some(x=>(x.whereUsed||[]).some(w=>w.parentPn===p.pn));
    // Auto-fill material
    const matEl=d.querySelector("#mf-mat");
    if(matEl&&!matEl.dataset.userEdited){
      matEl.value=hasKids?"Assembly":(p.material||"");
    }
    // Auto-fill storage location
    const locEl=d.querySelector("#mf-loc");
    if(locEl&&!locEl.dataset.userEdited){
      locEl.value=p.location||"";
    }
  }

  function updateSerializedComponentFields(){
    const partId=d.querySelector("#mf-part")?.value;
    const p=S.parts.find(x=>x.id===partId);
    if(p){
      const mi=d.querySelector("#mf-mat"),li=d.querySelector("#mf-loc"),ri=d.querySelector("#mf-rev");
      if(mi&&!mi.value)mi.value=p.material||"";
      if(li&&!li.value)li.value=p.location||"";
      if(ri)ri.value=p.rev||"-";
    }
    // Rebuild serialized component fields
    const wrap=d.querySelector("#mf-serial-comps");if(!wrap)return;
    if(!p){wrap.innerHTML="";return;}
    const children=getDirectSerializedChildren(p.pn,S.parts);
    if(!children.length){wrap.innerHTML="";return;}
    const qty=parseInt(d.querySelector("#mf-qty")?.value)||1;
    // one row per child × qty
    let html=`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px"><div style="font-size:11px;font-weight:700;color:var(--purple-text);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px">${I.serial} Serialized Components Used</div>`;
    children.forEach(child=>{
      const cQty=qtyInParent(child,p.pn)*qty;
      html+=`<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">${fullPN(child.pn,child.rev)} — ${child.name} (×${cQty})</div>`;
      for(let i=0;i<cQty;i++){
        // suggest unused serials
        const usedSnKeys=(o.serializedComps||[]).filter(sc=>sc.partId===child.id).map(sc=>sc.sn);
        const unassigned=getUnassignedSerials(child).filter(s=>!usedSnKeys.includes(s.sn));
        const sugSn=unassigned[i]?.sn||"";
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <span style="font-size:11px;color:var(--text3);min-width:50px">Unit ${i+1}</span>
          <select class="mf-comp-sn" data-child-id="${child.id}" data-unit="${i}"
            style="flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--purple-text);font-family:var(--mono);font-size:12px;-webkit-appearance:none;appearance:none">
            <option value="">— Unassigned —</option>
            ${(child.serials||[]).map(s=>`<option value="${s.sn}" ${s.sn===sugSn?"selected":""}>${s.sn} (${s.locationKind==="storage"?"storage":s.locationKind==="in-assembly"?"in-assembly":"disposed"})</option>`).join("")}
          </select>
        </div>`;
      }
      html+="</div>";
    });
    html+="</div>";
    wrap.innerHTML=html;
  }
  // mf-part change is now handled via part search
  setTimeout(()=>{
    const brParts=S.parts.filter(p=>!p.isOem&&p.status!=="Obsolete");
    bindPartSearch("mf-part",brParts);
    const inp=document.getElementById("mf-part");
    if(inp)inp.addEventListener("ps-select",()=>{
      updateSerializedComponentFields();
      // Auto-fill material and storage from selected part
      const selId=partSearchVal("mf-part");
      const sp=selId?S.parts.find(x=>x.id===selId):null;
      if(sp){
        const hasKids=S.parts.some(x=>(x.whereUsed||[]).some(w=>w.parentPn===sp.pn));
        const matEl=d.querySelector("#mf-mat");
        if(matEl&&!matEl.dataset.userEdited){
          matEl.value=hasKids?"Assembly":(sp.material||"");
        }
        const locEl=d.querySelector("#mf-loc");
        if(locEl&&!locEl.dataset.userEdited){
          locEl.value=sp.location||"";
        }
      }
    });
  },60);
  // mf-qty: wire via input event still works
  d.querySelector("#mf-qty")?.addEventListener("input",updateSerializedComponentFields);
  // Track manual edits to prevent autofill from overwriting
  ["#mf-mat","#mf-loc"].forEach(sel=>{d.querySelector(sel)?.addEventListener("input",e=>{e.target.dataset.userEdited="1";});});
  // Initial autofill if editing existing order
  if(o.partId){
    const sp=S.parts.find(x=>x.id===o.partId);
    if(sp){
      const hasKids=S.parts.some(x=>(x.whereUsed||[]).some(w=>w.parentPn===sp.pn));
      const matEl=d.querySelector("#mf-mat");
      if(matEl&&!matEl.dataset.userEdited&&!o.material)matEl.value=hasKids?"Assembly":(sp.material||"");
      const locEl=d.querySelector("#mf-loc");
      if(locEl&&!locEl.dataset.userEdited&&!o.storageLocation)locEl.value=sp.location||"";
    }
  }
  updateSerializedComponentFields();

  const snap=()=>JSON.stringify({part:partSearchVal("mf-part"),status:cSelVal("mf-status"),assignee:cSelVal("mf-assignee"),due:d.querySelector("#mf-due")?.value,qty:d.querySelector("#mf-qty")?.value,rev:cSelVal("mf-rev"),mat:d.querySelector("#mf-mat")?.value,stock:d.querySelector("#mf-stock")?.value,loc:d.querySelector("#mf-loc")?.value,notes:d.querySelector("#mf-notes")?.value});
  const orig=snap(),isDirty=()=>snap()!==orig;

  const doSave=()=>{
    const partId=partSearchVal("mf-part")||"";
    const p=S.parts.find(x=>x.id===partId)||{};
    const newId="mfg"+Date.now();
    const serializedComps=[];
    d.querySelectorAll(".mf-comp-sn").forEach(sel=>{if(sel.value)serializedComps.push({partId:sel.dataset.childId,sn:sel.value,unit:parseInt(sel.dataset.unit)});});
    const order={...o,mfgNum:o.mfgNum||nextMfgNum(S.mfgOrders),partId,partPn:p.pn||"",partRev:p.rev||"-",partName:p.name||"",status:cSelVal("mf-status")||"Open",assignee:cSelVal("mf-assignee")||"",dueDate:d.querySelector("#mf-due")?.value||"",qty:parseInt(d.querySelector("#mf-qty")?.value)||1,revision:cSelVal("mf-rev")||"-",material:d.querySelector("#mf-mat")?.value||"",stockNos:d.querySelector("#mf-stock")?.value||"",storageLocation:d.querySelector("#mf-loc")?.value||"",notes:d.querySelector("#mf-notes")?.value||"",serializedComps,id:o.id||newId};
    if(order.assignee&&!S.assigneeSuggestions.includes(order.assignee))S.assigneeSuggestions.push(order.assignee);
    order.updatedAt=Date.now();
    const idx=S.mfgOrders.findIndex(x=>x.id===order.id);if(idx>=0)S.mfgOrders[idx]=order;else S.mfgOrders.push(order);
    saveLocal(S.parts,S.mfgOrders);
    if(getFbCfg())fbUpsertOrder(order);
    closeDlg("mfg-form");render();return true;
  };
  const tryClose=()=>{if(isDirty())showUnsaved(doSave,()=>closeDlg("mfg-form"));else closeDlg("mfg-form");};
  d.querySelector("#mf-save").addEventListener("click",doSave);d.querySelector("#mf-cancel").addEventListener("click",tryClose);d.querySelector("#mf-x").addEventListener("click",tryClose);
  d.onclick=e=>{const r2=d.getBoundingClientRect();if(e.clientX<r2.left||e.clientX>r2.right||e.clientY<r2.top||e.clientY>r2.bottom)tryClose();};
}
function promptDeleteMfg(id){
  if(isMemberOnly()){memberBlocked("Deleting orders");return;}
  const o=S.mfgOrders.find(x=>x.id===id);if(!o)return;
  const d=openDlg("confirm-mfg","min(400px,96vw)",`<div style="padding:26px"><div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">${I.warn}<div style="font-size:15px;font-weight:700;color:var(--text)">Delete order for "${o.partName}"?</div></div><div style="font-size:13px;color:var(--text2);margin-bottom:20px">This manufacturing order will be permanently removed.</div><div style="display:flex;justify-content:flex-end;gap:8px"><button id="dm-cancel" class="btn">Cancel</button><button id="dm-ok" class="btn danger">Delete</button></div></div>`);
  d.querySelector("#dm-cancel").addEventListener("click",()=>closeDlg("confirm-mfg"));
  d.querySelector("#dm-ok").addEventListener("click",()=>{S.mfgOrders=S.mfgOrders.filter(x=>x.id!==id);saveLocal(S.parts,S.mfgOrders);if(getFbCfg())fbDeleteOrder(id);closeDlg("confirm-mfg");render();});
}

function openAddComponentDialog(parentPn,typeFilter){
  const parent=S.parts.find(x=>x.pn===parentPn);if(!parent)return;
  const alreadyUsed=S.parts.filter(p=>(p.whereUsed||[]).some(w=>w.parentPn===parentPn)).map(p=>p.id);
  const pool=S.parts.filter(p=>p.id!==parent.id&&!alreadyUsed.includes(p.id)&&(typeFilter==="br"?!p.isOem:typeFilter==="oem"?p.isOem:true));
  const d=openDlg("add-comp","min(420px,96vw)",`
  <div class="dh"><div class="dh-title">${I.plus} Add Component to ${esc(parent.name)}</div><button id="ac-x" class="btn icon">${I.x}</button></div>
  <div class="db">
    <div class="f"><label>Part</label>${partSearchHTML("ac-part", pool, "", "Search by PN or name…")}</div>
    <div class="f"><label>Quantity</label><input id="ac-qty" type="number" min="1" value="1" autocomplete="off"></div>
  </div>
  <div class="df"><button id="ac-cancel" class="btn">Cancel</button><button id="ac-ok" class="btn primary">Add</button></div>`);
  d.querySelector("#ac-x").addEventListener("click",()=>closeDlg("add-comp"));
  setTimeout(()=>bindPartSearch("ac-part",pool),60);
  d.querySelector("#ac-cancel").addEventListener("click",()=>closeDlg("add-comp"));
  d.querySelector("#ac-ok").addEventListener("click",()=>{
    const selId=partSearchVal("ac-part")||"",qty=parseInt(d.querySelector("#ac-qty")?.value)||1;
    if(!selId)return;const p=S.parts.find(x=>x.id===selId);if(!p)return;
    p.whereUsed=[...(p.whereUsed||[]),{parentPn,qty}];persistPart(p);closeDlg("add-comp");
  });
}
function openEditQtyDialog(compId,parentPn){
  const comp=S.parts.find(x=>x.id===compId);if(!comp)return;const cur=qtyInParent(comp,parentPn);
  const d=openDlg("edit-qty","min(320px,96vw)",`
  <div class="dh"><div class="dh-title">Edit Quantity</div><button id="eq-x" class="btn icon">${I.x}</button></div>
  <div class="db"><div class="f"><label>Quantity of ${comp.name} in ${S.parts.find(x=>x.pn===parentPn)?.name||parentPn}</label><input id="eq-qty" type="number" min="1" value="${cur}" autocomplete="off"></div></div>
  <div class="df"><button id="eq-cancel" class="btn">Cancel</button><button id="eq-ok" class="btn primary">Save</button></div>`);
  d.querySelector("#eq-x").addEventListener("click",()=>closeDlg("edit-qty"));
  d.querySelector("#eq-cancel").addEventListener("click",()=>closeDlg("edit-qty"));
  d.querySelector("#eq-ok").addEventListener("click",()=>{
    const qty=parseInt(d.querySelector("#eq-qty")?.value)||1;
    const wu=comp.whereUsed||[];const idx=wu.findIndex(w=>w.parentPn===parentPn);if(idx>=0)wu[idx].qty=qty;comp.whereUsed=wu;persistPart(comp);closeDlg("edit-qty");
  });
  setTimeout(()=>d.querySelector("#eq-qty")?.select(),50);
}
function openSnQuickAssign(partId,currentSn,event){
  document.getElementById("sn-popup")?.remove();
  const p=S.parts.find(x=>x.id===partId);if(!p)return;
  const unassigned=getUnassignedSerials(p).filter(s=>s.sn!==currentSn);
  const m=document.createElement("div");m.id="sn-popup";
  m.style.cssText=`position:fixed;left:${Math.min(event.clientX,window.innerWidth-220)}px;top:${Math.min(event.clientY+10,window.innerHeight-200)}px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:6px;min-width:200px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.8);font-size:13px`;
  m.innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;padding:4px 8px;margin-bottom:4px">Reassign ${currentSn}</div>
    <div class="ctx-item sn-unassign" style="color:var(--text2)">${I.remove} Remove assignment</div>
    ${unassigned.length?`<div style="height:1px;background:var(--border);margin:3px 0"></div>`:""}
    ${unassigned.map(s=>`<div class="ctx-item sn-assign" data-sn="${s.sn}" style="color:var(--purple-text);font-family:var(--mono)">${s.sn}</div>`).join("")}
    ${!unassigned.length?`<div style="padding:6px 8px;color:var(--text3);font-size:12px">No unassigned S# available</div>`:""}`;
  document.body.appendChild(m);
  m.querySelector(".sn-unassign").addEventListener("click",()=>{m.remove();const s=(p.serials||[]).find(x=>x.sn===currentSn);if(s){s.locationKind="storage";s.parentSn="";}persistPart(p);});
  m.querySelectorAll(".sn-assign").forEach(el=>{el.addEventListener("click",()=>{m.remove();const oldS=(p.serials||[]).find(x=>x.sn===currentSn),newS=(p.serials||[]).find(x=>x.sn===el.dataset.sn);if(oldS&&newS){const lk=oldS.locationKind,ps=oldS.parentSn;newS.locationKind=lk;newS.parentSn=ps;oldS.locationKind="storage";oldS.parentSn="";}persistPart(p);});});
  setTimeout(()=>document.addEventListener("click",()=>m.remove(),{once:true}),10);
}

// ══════════════════════════════════════════════════
//  WHERE-USED HELPERS
// ══════════════════════════════════════════════════
function buildWuRows(wu,pool){
  return wu.map((w,i)=>{
    const sel=pool.find(p=>p.pn===w.parentPn);
    const label=sel?`${fullPN(sel.pn,sel.rev)} — ${sel.name}`:(w.parentPn||"");
    return`<div class="wu-row" data-wu-idx="${i}" style="display:grid;grid-template-columns:1fr 80px 32px;gap:6px;align-items:center;margin-bottom:6px">
      <div style="position:relative">
        <input class="wu-parent-input" type="text" value="${label}" data-pn="${w.parentPn||""}" autocomplete="off" placeholder="Search parent part…"
          style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:12px;box-sizing:border-box">
        <div class="wu-dropdown" style="display:none;position:absolute;z-index:9999;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.4)"></div>
      </div>
      <input class="wu-qty" type="number" min="1" value="${w.qty||1}" autocomplete="off" style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--mono);font-size:12px;width:100%;box-sizing:border-box">
      <button class="btn icon danger wu-del" type="button">${I.trash}</button>
    </div>`;
  }).join("")+`<button class="btn sm wu-add" type="button" style="margin-top:4px">${I.plus} Add</button>`;
}
function collectWu(con){return Array.from(con.querySelectorAll(".wu-row")).map(r=>({parentPn:(r.querySelector(".wu-parent-input")?.dataset?.pn||"").trim(),qty:parseInt(r.querySelector(".wu-qty")?.value)||1})).filter(w=>w.parentPn);}

function buildDepRows(deps,pool){
  return (deps||[]).map((pn,i)=>{
    const sel=pool.find(p=>p.pn===pn);
    const label=sel?`${fullPN(sel.pn,sel.rev)} — ${sel.name}`:(pn||"");
    return`<div class="dep-row" data-dep-idx="${i}" style="display:grid;grid-template-columns:1fr 32px;gap:6px;align-items:center;margin-bottom:6px">
      <div style="position:relative">
        <input class="dep-pn-input" type="text" value="${label}" data-pn="${pn||""}" autocomplete="off" placeholder="Search part…"
          style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:12px;box-sizing:border-box">
        <div class="dep-dropdown" style="display:none;position:absolute;z-index:9999;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.4)"></div>
      </div>
      <button class="btn icon danger dep-del" data-idx="${i}" type="button">${I.trash}</button>
    </div>`;
  }).join("")+`<button class="btn sm dep-add" type="button" style="margin-top:4px">${I.plus} Add Dependency</button>`;
}
function collectDeps(con){return Array.from((con||document).querySelectorAll(".dep-row")).map(r=>(r.querySelector(".dep-pn-input")?.dataset?.pn||"").trim()).filter(Boolean);}
function bindDep(con,pool){
  con.querySelectorAll(".dep-del").forEach(btn=>{btn.addEventListener("click",()=>{const d=collectDeps(con);d.splice(parseInt(btn.dataset.idx),1);con.innerHTML=buildDepRows(d,pool);bindDep(con,pool);});});
  con.querySelector(".dep-add")?.addEventListener("click",()=>{const d=collectDeps(con);d.push("");con.innerHTML=buildDepRows(d,pool);bindDep(con,pool);setTimeout(()=>{const ins=con.querySelectorAll(".dep-pn-input");if(ins.length)ins[ins.length-1].focus();},50);});
  con.querySelectorAll(".dep-pn-input").forEach(inp=>{
    const dd=inp.nextElementSibling;
    function show(q){const lq=(q||"").toLowerCase();const m=!q?pool.slice(0,40):pool.filter(p=>(p.pn||"").toLowerCase().includes(lq)||(p.name||"").toLowerCase().includes(lq)).slice(0,40);if(!m.length){dd.style.display="none";return;}dd.innerHTML=m.map(p=>`<div class="dep-opt" data-pn="${p.pn}" style="padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"><span style="font-family:var(--mono);color:var(--text)">${fullPN(p.pn,p.rev)}</span><span style="color:var(--text2);margin-left:8px">${esc(p.name)}</span></div>`).join("");dd.style.display="block";dd.querySelectorAll(".dep-opt").forEach(o=>{o.addEventListener("mousedown",e=>{e.preventDefault();const p=pool.find(x=>x.pn===o.dataset.pn);inp.value=p?`${fullPN(p.pn,p.rev)} — ${p.name}`:o.dataset.pn;inp.dataset.pn=o.dataset.pn;dd.style.display="none";});});}
    inp.addEventListener("input",()=>show(inp.value));inp.addEventListener("focus",()=>show(inp.value));inp.addEventListener("blur",()=>setTimeout(()=>{dd.style.display="none";},150));
  });
}
function bindWu(con,pool,onUpdate){
  con.querySelectorAll(".wu-del").forEach(btn=>{btn.addEventListener("click",()=>{const wu=collectWu(con);wu.splice(parseInt(btn.closest("[data-wu-idx]").dataset.wuIdx),1);con.innerHTML=buildWuRows(wu,pool);bindWu(con,pool,onUpdate);if(onUpdate)onUpdate();});});
  // Where Used text search inputs
  con.querySelectorAll(".wu-parent-input").forEach((inp,idx)=>{
    const dropdown=inp.nextElementSibling;
    function showWuOptions(q){
      const lq=(q||"").toLowerCase();
      const matches=!q?pool.slice(0,40):pool.filter(p=>(p.pn||"").toLowerCase().includes(lq)||(p.name||"").toLowerCase().includes(lq)).slice(0,40);
      if(!matches.length){dropdown.style.display="none";return;}
      dropdown.innerHTML=matches.map(p=>`<div class="wu-opt" data-pn="${p.pn}" style="padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"><span style="font-family:var(--mono);color:var(--text)">${fullPN(p.pn,p.rev)}</span><span style="color:var(--text2);margin-left:8px">${esc(p.name)}</span></div>`).join("");
      dropdown.style.display="block";
      dropdown.querySelectorAll(".wu-opt").forEach(opt=>{
        opt.addEventListener("mousedown",e=>{
          e.preventDefault();
          inp.value=`${fullPN(opt.dataset.pn,pool.find(x=>x.pn===opt.dataset.pn)?.rev||"-")} — ${pool.find(x=>x.pn===opt.dataset.pn)?.name||""}`;
          inp.dataset.pn=opt.dataset.pn;
          dropdown.style.display="none";
          // Autofill assignee from first parent
          if(idx===0){
            const parent=S.parts.find(x=>x.pn===opt.dataset.pn);
            if(parent?.assignee&&!cSelVal("ef-assignee")){
              const trigger=document.getElementById("ef-assignee");
              if(trigger){
                trigger.dataset.cselVal=parent.assignee;
                const lbl=trigger.querySelector(".csel-label");
                if(lbl){lbl.textContent=parent.assignee;lbl.style.color="";}
                if(_csOpts["ef-assignee"])_csOpts["ef-assignee"].currentVal=parent.assignee;
              }
            }
          }
          if(onUpdate)onUpdate();
        });
      });
    }
    inp.addEventListener("input",()=>showWuOptions(inp.value));
    inp.addEventListener("focus",()=>showWuOptions(inp.value));
    inp.addEventListener("blur",()=>setTimeout(()=>{dropdown.style.display="none";},150));
  });
  con.querySelector(".wu-add")?.addEventListener("click",()=>{const wu=collectWu(con);wu.push({parentPn:"",qty:1});con.innerHTML=buildWuRows(wu,pool);bindWu(con,pool,onUpdate);});
}

function openEdit(id,preParentPn){
  if(isMemberOnly()){memberBlocked("Editing parts");return;}
  const existing=id?S.parts.find(x=>x.id===id):null;
  const p=existing?JSON.parse(JSON.stringify(existing)):blank(preParentPn||"");
  const isNew=!existing,kids=!isNew&&hasKids(p.pn,S.parts);

  const pool=S.parts.filter(x=>!x.isOem&&x.id!==p.id);
  const allPool=S.parts.filter(x=>x.id!==p.id);
  const firstNha=(p.whereUsed||[])[0]?.parentPn||"";
  const sug=firstNha&&isNew?suggestPN(S.parts,firstNha,p.id):"",lvl=pnLevel(firstNha);

  const d=openDlg("br","min(720px,96vw)",`

          style="flex:1;min-width:0;padding:9px 12px;border:1px solid var(--border2);border-right:none;border-radius:var(--r) 0 0 var(--r);background:var(--bg3);color:var(--text);font-family:var(--mono);font-size:14px;box-sizing:border-box;outline:none">
        ${cSelHTML("ef-rev", REV_OPTS_LIST(), p.rev||"-", "_noop", {mono:true, style:"width:130px;flex-shrink:0;border-radius:0 var(--r) var(--r) 0;border-left:none"})}
      </div>
      <div id="sug-box" class="sug-box" style="display:${sug&&isNew?"flex":"none"}">Next available: <span id="sug-pn" class="sug-pn">${sug}</span><button id="ef-use-sug" class="btn sm" type="button" style="padding:3px 8px">use</button></div>
      <div id="sug-hint" class="f-hint" style="display:${lvl?"block":"none"}">${lvl?`Level ${lvl} under ${firstNha}`:""}</div>
    </div>
    <div class="f-row">
      <div class="f"><label>Status</label>${cSelHTML("ef-status", BR_STATUS_OPTS(), p.status||"In Design", "_noop")}</div>
      <div class="f"><label>Assignee</label>${cSelHTML("ef-assignee", MEMBER_OPTS(p.assignee), p.assignee||"", "_noop", {placeholder:"— Unassigned —"})}</div>
    </div>
    <div class="f"><label>Name</label><input id="ef-name" type="text" autocomplete="off" value="${esc(p.name)}" placeholder="e.g. Gearbox Upper Casing"></div>
    <div class="f"><label>Where Used</label><div id="wu-con">${buildWuRows((p.whereUsed&&p.whereUsed.length>0)?p.whereUsed:[{parentPn:"",qty:1}],pool)}</div></div>
    <div class="f"><label>Dependencies <span style="font-weight:400;font-size:10px;color:var(--text3)">(parts this part depends on)</span></label><div id="ef-dep-con">${buildDepRows(p.dependencies||[],allPool)}</div></div>
    <div class="f-row">
      <div class="f"><label>Material Cost ($)${kids?" — auto":""}</label><input id="ef-cost" type="number" value="${kids?r.cost.toFixed(2):p.matCost||0}" ${kids?'class="f-dis" disabled':""} autocomplete="off"></div>
      <div class="f"><label>Mass (lb)${kids?" — auto":""}</label><input id="ef-mass" type="number" value="${kids?r.mass.toFixed(3):parseFloat(p.mass)||0}" ${kids?'class="f-dis" disabled':""} autocomplete="off"></div>
    </div>
    <div class="f-row">
      <div class="f"><label>Material${kids?" — N/A":""}</label><input id="ef-mat" type="text" autocomplete="off" value="${kids?"N/A":p.material||""}" ${kids?'class="f-dis" disabled':""} placeholder="e.g. 7075-T6 Al"></div>
      <div class="f"><label>Storage Location</label><input id="ef-loc" type="text" autocomplete="off" value="${p.location||""}" placeholder="e.g. Shelf A2"></div>
    </div>
    <div class="f-row">
      <div class="f"><label>Drawing / CAD Link</label><input id="ef-draw" type="text" autocomplete="off" value="${p.drawingUrl||""}" placeholder="https://…"></div>
      <div class="f"><label>Design Due Date</label><input id="ef-duedate" type="date" value="${p.designDueDate||""}" autocomplete="off"></div>
    </div>
    <div class="f"><label>Notes</label><textarea id="ef-desc" autocomplete="off">${p.desc||""}</textarea></div>
    <hr class="sec-div">
    <div class="sec-lbl">Design &amp; Manufacturing Attribution</div>
    <div class="f-row">
    </div>
    ${!p.serialized?`<div class="f-row">
    </div>`:``}
    <hr class="sec-div">
    <div style="display:flex;align-items:center;gap:14px">
      <span class="sec-lbl" style="margin:0">Serialize?</span>
      ${cSelHTML("ef-serial", [{value:"0",label:"No"},{value:"1",label:"Yes"}], p.serialized?"1":"0", "_noop")}
    </div>
  </div>
  <div class="df"><button id="ef-cancel" class="btn">Cancel</button><button id="ef-save" class="btn primary">${isNew?"Add Part":"Save Changes"}</button></div>`,{backdropClose:false});

  const pnInput=d.querySelector("#ef-pn");
  setTimeout(()=>pnInput?.focus(),60);
  pnInput?.addEventListener("mousedown",e=>e.stopPropagation());
  pnInput?.addEventListener("click",e=>e.stopPropagation());
  const wuCon=d.querySelector("#wu-con");
  const updateSug=()=>{const wu=collectWu(wuCon),fn=wu[0]?.parentPn||"";const s2=fn&&isNew?suggestPN(S.parts,fn,p.id):"",l2=pnLevel(fn);const sb=d.querySelector("#sug-box"),sp=d.querySelector("#sug-pn"),sh=d.querySelector("#sug-hint");if(sb)sb.style.display=s2&&isNew?"flex":"none";if(sp&&s2)sp.textContent=s2;if(sh){sh.textContent=l2?`Level ${l2} under ${fn}`:"";sh.style.display=l2?"block":"none";}};

        if(_csOpts["ef-assignee"])_csOpts["ef-assignee"].currentVal=parent.assignee;

  const snap=()=>JSON.stringify({pn:d.querySelector("#ef-pn")?.value,rev:cSelVal("ef-rev"),name:d.querySelector("#ef-name")?.value,status:cSelVal("ef-status"),assignee:cSelVal("ef-assignee"),cost:d.querySelector("#ef-cost")?.value,mass:d.querySelector("#ef-mass")?.value,mat:d.querySelector("#ef-mat")?.value,loc:d.querySelector("#ef-loc")?.value,draw:d.querySelector("#ef-draw")?.value,desc:d.querySelector("#ef-desc")?.value,serial:cSelVal("ef-serial"),duedate:d.querySelector("#ef-duedate")?.value,wu:collectWu(wuCon)});
  const orig=snap(),isDirty=()=>snap()!==orig;
  const doSave=()=>{
    const nv=(d.querySelector("#ef-name")?.value||"").trim();if(!nv){d.querySelector("#ef-name").style.outline="2px solid #a32d2d";d.querySelector("#ef-name").focus();return false;}
    const rawPn=(d.querySelector("#ef-pn")?.value||"").trim();
    // Validate project code if any codes are configured
    if(S.projectCodes&&S.projectCodes.length>0&&rawPn){
      const code=getProjCode(rawPn);
      if(!S.projectCodes.some(pc=>pc.code===code)){
        const valid=S.projectCodes.map(pc=>fmtProjCode(pc.code,pc.name)).join(", ");
        const pnEl=d.querySelector("#ef-pn");
        if(pnEl){pnEl.style.outline="2px solid #a32d2d";pnEl.focus();}
        alert(`Invalid project code "${code}".

Valid codes: ${valid}

Update the part number or add this project code in Settings.`);
        return false;
      }
    }
    const part={...p,pn:rawPn,rev:cSelVal("ef-rev")||"-",name:nv,status:cSelVal("ef-status")||"In Design",assignee:cSelVal("ef-assignee")||"",whereUsed:collectWu(wuCon),dependencies:collectDeps(d.querySelector("#ef-dep-con")),matCost:kids?r.cost:(parseFloat(d.querySelector("#ef-cost")?.value)||0),mass:kids?r.mass:(parseFloat(d.querySelector("#ef-mass")?.value)||0),material:kids?"Assembly":(d.querySelector("#ef-mat")?.value||""),location:d.querySelector("#ef-loc")?.value||"",drawingUrl:d.querySelector("#ef-draw")?.value||"",desc:d.querySelector("#ef-desc")?.value||"",serialized:cSelVal("ef-serial")==="1",designDueDate:d.querySelector("#ef-duedate")?.value||"",isOem:false,id:p.id||("p"+Date.now())};
    if(part.assignee&&!S.assigneeSuggestions.includes(part.assignee))S.assigneeSuggestions.push(part.assignee);
    persistPart(part);closeDlg("br");return true;
  };
  const tryClose=()=>{if(isDirty())showUnsaved(doSave,()=>closeDlg("br"));else closeDlg("br");};
  d.querySelector("#ef-save").addEventListener("click",doSave);d.querySelector("#ef-cancel").addEventListener("click",tryClose);d.querySelector("#ef-x").addEventListener("click",tryClose);
  d.onclick=e=>{const r2=d.getBoundingClientRect();if(e.clientX<r2.left||e.clientX>r2.right||e.clientY<r2.top||e.clientY>r2.bottom)tryClose();};
}

function openSerialModal(id){
  const getPart=()=>S.parts.find(x=>x.id===id);
  const p0=getPart();if(!p0)return;

  function buildTable(serials){
    if(!serials.length)return`<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--text3);font-size:13px">No serials yet.</td></tr>`;
    return serials.map((s,i)=>{
      const inStyle="padding:4px 6px;border:1px solid var(--border2);border-radius:4px;background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:12px;width:100%;box-sizing:border-box";
      const selStyle=inStyle+";cursor:pointer";
      return`<tr data-sr-idx="${i}" style="border-bottom:1px solid var(--border)">
        <td style="padding:4px 5px;min-width:130px"><input class="sr-sn" type="text" autocomplete="off" value="${s.sn}" style="${inStyle};font-family:var(--mono);color:var(--purple-text)"></td>
        <td style="padding:4px 5px;min-width:90px"><input class="sr-cond" type="text" autocomplete="off" value="${s.condition||""}" placeholder="e.g. New" style="${inStyle}"></td>
        <td style="padding:4px 5px;min-width:110px"><input class="sr-date" type="date" value="${s.dateMfg||""}" style="${inStyle}"></td>
        <td style="padding:4px 5px;min-width:120px"><input class="sr-notes" type="text" autocomplete="off" value="${s.notes||""}" placeholder="Notes" style="${inStyle}"></td>
        <td style="padding:4px 5px;width:32px"><button class="btn icon danger sr-del" data-idx="${i}" type="button" style="padding:3px">${I.trash}</button></td>
      </tr>`;
    }).join("");
  }

  function collectSerials(tbody){
    return Array.from(tbody.querySelectorAll("tr[data-sr-idx]")).map(row=>({
      sn:row.querySelector(".sr-sn")?.value.trim()||"",
      condition:row.querySelector(".sr-cond")?.value||"",
      dateMfg:row.querySelector(".sr-date")?.value||"",
      notes:row.querySelector(".sr-notes")?.value||"",
    })).filter(s=>s.sn);
  }

  function bindTbl(tbody){
    tbody.querySelectorAll(".sr-del").forEach(btn=>{btn.addEventListener("click",()=>{const cur=collectSerials(tbody);cur.splice(parseInt(btn.dataset.idx),1);tbody.innerHTML=buildTable(cur);bindTbl(tbody);});});
  }

  const d=openDlg("serials","min(1000px,96vw)",`
  <div class="dh">
    <span class="dh-title" style="display:flex;align-items:center;gap:7px">${I.serial} Serials — ${esc(p0.name)}</span>
    <span style="font-size:12px;color:var(--text3)">${(p0.serials||[]).length} registered</span>
    <button id="sr-x" class="btn icon" style="margin-left:auto">${I.x}</button>
  </div>
  <div class="db" style="overflow-x:auto"><div style="min-width:600px">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--border)">
        ${["Serial #","Condition","Mfg Date","Notes",""].map((h,i)=>`<th style="text-align:left;padding:7px ${i===4?4:6}px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;${i===4?"width:32px":""}">${h}</th>`).join("")}
      </tr></thead>
      <tbody id="sr-tbody">${buildTable(p0.serials||[])}</tbody>
    </table>
    <button id="sr-add-row" class="btn sm primary" type="button" style="margin-top:10px">${I.plus} Add Serial</button>
  </div></div>
  <div class="df"><button id="sr-close" class="btn">Cancel</button><button id="sr-save" class="btn primary">Save Serials</button></div>`);

  const tbody=d.querySelector("#sr-tbody");bindTbl(tbody);
  d.querySelector("#sr-add-row").addEventListener("click",()=>{
    const p2=getPart();if(!p2)return;
    const cur=collectSerials(tbody);
    const curSns=cur.map(s=>s.sn);
    cur.push({sn:nextSerial(S.parts,p2.pn,p2.rev,curSns),locationKind:"storage",condition:"New",dateMfg:"",notes:""});
    tbody.innerHTML=buildTable(cur);bindTbl(tbody);
  });
  d.querySelector("#sr-save").addEventListener("click",()=>{
    const p2=getPart();if(!p2)return;p2.serials=collectSerials(tbody);
    if(S.selected?.id===id)S.selected={...p2};persistPart(p2);closeDlg("serials");
  });
  d.querySelector("#sr-close").addEventListener("click",()=>closeDlg("serials"));
  d.querySelector("#sr-x").addEventListener("click",()=>closeDlg("serials"));
}

function removeFromAssembly(partId,parentPn){
  const p=S.parts.find(x=>x.id===partId);if(!p)return;
  p.whereUsed=(p.whereUsed||[]).filter(w=>w.parentPn!==parentPn);

function openPieChart(id,metric){
  const p=S.parts.find(x=>x.id===id);if(!p||!hasKids(p.pn,S.parts))return;
  const r=rollup(p.id,S.parts),total=metric==="cost"?r.cost:r.mass;
  const kids=S.parts.filter(x=>(x.whereUsed||[]).some(w=>w.parentPn===p.pn));
  const d=openDlg("chart","min(520px,96vw)",`<div class="dh"><div class="dh-title">${esc(p.name)} — ${metric==="cost"?"Cost":"Mass"} Breakdown</div><span style="font-size:12px;color:var(--text2);margin-left:4px">Total: ${metric==="cost"?fmtC(total):fmtM(total)}</span><button id="ch-x" class="btn icon" style="margin-left:auto">${I.x}</button></div><div class="db" style="padding:20px"><canvas id="pie-canvas" width="456" height="320"></canvas></div>`);
  d.querySelector("#ch-x").addEventListener("click",()=>closeDlg("chart"));
  setTimeout(()=>{
    if(chartInst){chartInst.destroy();chartInst=null;}
    const canvas=d.querySelector("#pie-canvas");if(!canvas)return;
    const labels=[],data=[],colors=[];
    kids.forEach((c,i)=>{const q=qtyInParent(c,p.pn);const cr=rollup(c.id,S.parts);const val=(metric==="cost"?cr.cost:cr.mass)*q;if(val>0){labels.push(`${c.name}${q>1?` ×${q}`:""}`);data.push(metric==="cost"?Math.round(val*100)/100:Math.round(val*1000)/1000);colors.push(CHART_COLORS[i%CHART_COLORS.length]);}});
    if(!data.length){canvas.insertAdjacentHTML("afterend","<div style='text-align:center;color:var(--text3);padding:20px'>No data.</div>");return;}
    chartInst=new Chart(canvas,{type:"pie",data:{labels,datasets:[{data,backgroundColor:colors,borderColor:"#141416",borderWidth:2}]},options:{responsive:false,plugins:{legend:{position:"bottom",labels:{color:"#9898b0",font:{size:12},padding:12,boxWidth:14}},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed,tot=data.reduce((a,b)=>a+b,0),pct=tot>0?((v/tot)*100).toFixed(1):0;return` ${ctx.label}: ${metric==="cost"?"$"+Math.round(v).toLocaleString():v.toFixed(3)+" lb"} (${pct}%)`;}}}}}});
  },50);
}

function openMfgCompleteSerialPrompt(order,part){
  const qty=order.qty||1;
  // Generate suggested next serial numbers (non-duplicate)
  const suggestions=[];
  for(let i=0;i<qty;i++){
    // Build a temp parts array that includes already-suggested SNs
    const tempSerials=[...(part.serials||[]),...suggestions];
    const tempPart={...part,serials:tempSerials};
    const base=fullPN(part.pn,part.rev);
    const usedSns=[...tempSerials.map(s=>s.sn),...suggestions.map(s=>s.sn)];
    let n=1;
    while(usedSns.includes(base+"K"+String(n).padStart(2,"0")))n++;
    const newSn=base+"K"+String(n).padStart(2,"0");
    suggestions.push({sn:newSn,locationKind:"storage",dateMfg:new Date().toISOString().slice(0,10),condition:"New",notes:""});
  }

  const rows=suggestions.map((s,i)=>`<div style="display:grid;grid-template-columns:160px 1fr;gap:8px;align-items:start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px">Serial #${i+1}</div>
      <input id="csp-sn-${i}" type="text" autocomplete="off" value="${s.sn}" style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--purple-text);font-family:var(--mono);font-size:13px;box-sizing:border-box">
    </div>
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px">Notes</div>
      <input id="csp-notes-${i}" type="text" autocomplete="off" placeholder="Optional notes for this unit" style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px;box-sizing:border-box">
    </div>
  </div>`).join("");

  const d=openDlg("mfg-complete","min(600px,96vw)",`
  <div class="dh">
    <div class="dh-title">${I.serial} Register Serials — ${part.name}</div>
    <span style="font-size:12px;color:var(--text3);margin-left:4px">Order ${order.mfgNum||""} · Qty ${qty}</span>
    <button id="csp-x" class="btn icon" style="margin-left:auto">${I.x}</button>
  </div>
  <div class="db">
    <div class="ai" style="margin-bottom:14px">Order marked complete. Enter serial numbers for the ${qty} unit${qty!==1?"s":""} produced. They will be added to storage.</div>
    ${rows}
  </div>
  <div class="df">
    <button id="csp-skip" class="btn">Skip</button>
    <button id="csp-save" class="btn primary">Add Serials to Inventory</button>
  </div>`);

  const doSave=()=>{
    const newSerials=[];
    const today=new Date().toISOString().slice(0,10);
    for(let i=0;i<qty;i++){
      const sn=(d.querySelector(`#csp-sn-${i}`)?.value||"").trim();
      const notes=d.querySelector(`#csp-notes-${i}`)?.value||"";
      if(!sn)continue;
      newSerials.push({sn,locationKind:"storage",parentSn:"",dateMfg:today,condition:"New",notes});
    }
    // Store produced serial numbers on the order for display
    const ord=S.mfgOrders.find(x=>x.id===order.id);
    if(ord)ord.producedSerials=newSerials.map(s=>s.sn);
    saveLocal(S.parts,S.mfgOrders);
    // Add new serials to the part
    const p2=S.parts.find(x=>x.id===part.id);
    if(p2){
      p2.serials=[...(p2.serials||[]),...newSerials];
      persistPart(p2);
    }
    // Now apply serial attributions (producedSerials now available)
    // Update serialized component locations
    const comps=order.serializedComps||[];
    comps.forEach((sc,idx)=>{
      const cp=S.parts.find(x=>x.id===sc.partId);if(!cp)return;
      const serial=(cp.serials||[]).find(s=>s.sn===sc.sn);if(!serial)return;
      serial.locationKind="in-assembly";
      // If the ordered part is serialized and we have a new serial for this unit, link to it
      if(p2&&p2.serialized&&newSerials.length>0){
        // map by unit index: sc.unit corresponds to the i-th produced serial
        const unitSn=newSerials[sc.unit]?.sn||newSerials[0]?.sn||"";
        serial.parentSn=unitSn;
      }else{
        serial.parentSn="";
      }
      persistPart(cp);
    });
    closeDlg("mfg-complete");render();
  };
  d.querySelector("#csp-save").addEventListener("click",doSave);
  d.querySelector("#csp-skip").addEventListener("click",()=>{closeDlg("mfg-complete");render();});
  d.querySelector("#csp-x").addEventListener("click",()=>{closeDlg("mfg-complete");render();});
}

function openHistory(){

// Direct REST API access — no auth token needed in test mode
async function fbToken(){
  try{
    const auth=initFbAuth();
    if(!auth||!auth.currentUser)return null;
    return await auth.currentUser.getIdToken();
  }catch(e){return null;}
}
async function fbUrl(path){
  const cfg=getFbCfg();
  const token=await fbToken();
  const base=`${cfg.databaseURL}/${path}.json`;
  return token?`${base}?auth=${token}`:base;
}
async function fbGet(path){
  const url=await fbUrl(path);
  const r=await fetch(url);
  if(!r.ok) throw new Error(`Firebase GET ${r.status}`);
  return r.json();
}
async function fbPut(path,data){
  const url=await fbUrl(path);
  const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`Firebase PUT ${r.status}`);
  return r.json();
}
async function fbPatch(path,data){
  const url=await fbUrl(path);
  const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`Firebase PATCH ${r.status}`);
}
async function fbDelete(path){
  const url=await fbUrl(path);
  const r=await fetch(url,{method:'DELETE'});
  if(!r.ok) throw new Error(`Firebase DELETE ${r.status}`);
}

function fbKey(id){ return (id||'').replace(/[.#$\[\]]/g,'_'); }

async function fetchRemoteState(){
  const data=await fbGet('ipm'); if(!data) return null;
  return {
    parts:data.parts?Object.values(data.parts):[],
    mfgOrders:data.mfgOrders?Object.values(data.mfgOrders):[],
    teamMembers:data.settings?.teamMembers||[],
    teamRoster:data.settings?.teamRoster||[],
    compDate:data.settings?.compDate||'',
    deadlines:data.settings?.deadlines||[],
    projectCodes:data.settings?.projectCodes||[],
    units:data.settings?.units||[],
    majorAssy:data.settings?.majorAssy||'',
    settingsUpdatedAt:data.settings?.settingsUpdatedAt||0,
  };
}

async function upsertAll(parts,mfgOrders){
  if(!getFbCfg()) return;
  const po={},oo={};
  (parts||[]).forEach(p=>{po[fbKey(p.id)]=p;});
  (mfgOrders||[]).forEach(o=>{oo[fbKey(o.id)]=o;});
  const settings={teamMembers:S.teamMembers||[],teamRoster:S.teamRoster||[],compDate:S.compDate||'',
    deadlines:S.deadlines||[],projectCodes:S.projectCodes||[],
    units:S.units||[],majorAssy:S.majorAssy||'',settingsUpdatedAt:S.settingsUpdatedAt||0};
  try{
    await fbPut('ipm',{parts:po,mfgOrders:oo,settings});
    console.log('[FB] upsertAll OK —',Object.keys(po).length,'parts,',Object.keys(oo).length,'orders');
  }catch(e){
    console.error('[FB] upsertAll FAILED:',e.message);
    S.error='Sync failed: '+e.message; S.syncStatus='error'; render();
  }
}

async function fbUpsertPart(part){
  if(!S.connected||!getFbCfg()) return;
  try{
    await fbPatch('ipm/parts',{[fbKey(part.id)]:part});
    console.log('[FB] wrote part',part.pn||part.id);
  }catch(e){
    console.error('[FB upsertPart FAILED]',e.message);
    S.error='Sync write failed: '+e.message; S.syncStatus='error'; render();

}

async function connectFirebase(){
  if(!getFbCfg()){ openSetup(); return; }
  S.error=null; S.syncStatus='syncing'; render();
  try{
    const remote=await fetchRemoteState();
    if(remote&&(remote.parts.length>0||remote.mfgOrders.length>0)){
      // Firebase has data — take it as source of truth on connect/refresh
      S.parts=remote.parts;
      S.mfgOrders=remote.mfgOrders;
      if((remote.settingsUpdatedAt||0)>=(S.settingsUpdatedAt||0)){
        if(remote.teamMembers)S.teamMembers=remote.teamMembers;if(remote.teamRoster)S.teamRoster=remote.teamRoster;
        if(remote.compDate)S.compDate=remote.compDate;
        if(remote.deadlines)S.deadlines=remote.deadlines;
        if(remote.projectCodes)S.projectCodes=remote.projectCodes;
        if(remote.units)S.units=remote.units;
        if(remote.majorAssy!==undefined)S.majorAssy=remote.majorAssy;

      }
      saveLocal(S.parts,S.mfgOrders);
      console.log('[FB] loaded',S.parts.length,'parts from Firebase');
    } else {
      // Firebase is empty — first device connecting, push local up
      await upsertAll(S.parts,S.mfgOrders);
    }
    S.connected=true; S.syncStatus='live';
    startPolling();
  }catch(err){
    S.error='Firebase: '+err.message; S.syncStatus='error'; S.connected=false;
  }
  render();
}

// ── SYNC MERGE ─────────────────────────────────────────────────────────
// Merges remote SharePoint state into local by updatedAt timestamp per item.
// Whoever edited a given part/order most recently wins. New items from either
// side are kept. This runs on reconnect before pushing local changes.
function mergeRemoteState(remote){
  if(!remote)return;

  // Parts: last-write-wins per id
  const lpm=new Map(S.parts.map(p=>[p.id,p]));
  (remote.parts||[]).forEach(rp=>{
    const lp=lpm.get(rp.id);
    if(!lp||(rp.updatedAt||0)>(lp.updatedAt||0))lpm.set(rp.id,rp);
  });
  S.parts=[...lpm.values()];

  // Mfg orders: same
  const lom=new Map(S.mfgOrders.map(o=>[o.id,o]));
  (remote.mfgOrders||[]).forEach(ro=>{
    const lo=lom.get(ro.id);
    if(!lo||(ro.updatedAt||0)>(lo.updatedAt||0))lom.set(ro.id,ro);
  });
  S.mfgOrders=[...lom.values()];

  // Settings: remote wins if it has a newer settingsUpdatedAt
  if((remote.settingsUpdatedAt||0)>(S.settingsUpdatedAt||0)){
    if(remote.teamMembers)S.teamMembers=remote.teamMembers;if(remote.teamRoster)S.teamRoster=remote.teamRoster;
    if(remote.compDate)S.compDate=remote.compDate;

    if(remote.projectCodes)S.projectCodes=remote.projectCodes;

  console.log("[IPM sync] Merged: "+S.parts.length+" parts, "+S.mfgOrders.length+" orders");

// Pull remote state, merge, then push merged result
async function pullFromFirebase(){
  if(!S.connected)return;
  S.syncStatus="syncing";render();
  try{
    const remote=await fetchRemoteState();
    if(remote&&(remote.parts.length>0||remote.mfgOrders.length>0)){
      S.parts=remote.parts;
      S.mfgOrders=remote.mfgOrders;
      if((remote.settingsUpdatedAt||0)>=(S.settingsUpdatedAt||0)){
        if(remote.teamMembers)S.teamMembers=remote.teamMembers;if(remote.teamRoster)S.teamRoster=remote.teamRoster;
        if(remote.compDate)S.compDate=remote.compDate;
        if(remote.deadlines)S.deadlines=remote.deadlines;
        if(remote.projectCodes)S.projectCodes=remote.projectCodes;
        if(remote.units)S.units=remote.units;
        if(remote.majorAssy!==undefined)S.majorAssy=remote.majorAssy;
        S.settingsUpdatedAt=remote.settingsUpdatedAt||0;
      }
      saveLocal(S.parts,S.mfgOrders);
      console.log('[FB] pulled',S.parts.length,'parts');
    }
    S.syncStatus="live";
  }catch(e){
    S.syncStatus="error";S.error="Pull failed: "+e.message;
  }
  render();
}

async function pullMergePush(){
  if(!S.connected)return;
  try{
    const remote=await fetchRemoteState?.();
    if(remote)mergeRemoteState(remote);
    // Push merged state
    await upsertAll?.(S.parts,S.mfgOrders);
    S.syncStatus="live";
  }catch(e){
    console.warn("[IPM sync] pullMergePush failed:",e.message);
    S.syncStatus="error";S.error="Sync merge failed: "+e.message;
  }
  render();
}

// Reconnect handler — pull+merge before pushing local changes
window.addEventListener("online",()=>{
  if(S.connected){S.syncStatus="syncing";render();pullMergePush();}
});
window.addEventListener("offline",()=>{S.syncStatus="offline";render();});

// Auto-poll: pull and merge remote state every 30 seconds
let _pollInterval=null;
function startPolling(){
  if(_pollInterval)return;
  _pollInterval=setInterval(async()=>{
    if(!S.connected||S.syncStatus==="offline")return;
    try{
      const remote=await fetchRemoteState?.();
      if(remote){
        const before=JSON.stringify(S.parts)+JSON.stringify(S.mfgOrders);
        mergeRemoteState(remote);
        saveLocal(S.parts,S.mfgOrders);
        const after=JSON.stringify(S.parts)+JSON.stringify(S.mfgOrders);
        if(before!==after)render();
      }
    }catch(e){
      console.warn("[IPM poll] fetch failed:",e.message);
    }
  },30000);
}
function stopPolling(){if(_pollInterval){clearInterval(_pollInterval);_pollInterval=null;}}

// Get all descendant part IDs under a given parentPn (recursive)
function getAllDescendants(parentPn, parts, visited=new Set()){
  if(visited.has(parentPn))return[];
  visited.add(parentPn);
  const children=parts.filter(p=>(p.whereUsed||[]).some(w=>w.parentPn===parentPn));
  let all=[...children];
  children.forEach(c=>{all=[...all,...getAllDescendants(c.pn,parts,visited)];});
  return all;
}
